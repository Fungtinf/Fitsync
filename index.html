// Reusable: 7-day chip selector for backdating logs (steps/water/sleep/HR/etc)
// selectedDate is "YYYY-MM-DD" or null (= today)
const DateChips = ({ selectedDate, onChange }) => {
  const todayISO = todayLocalISO();
  const isToday = !selectedDate || selectedDate === todayISO;
  
  const chips = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const iso = toLocalISO(d);
    chips.push({
      iso,
      label: i === 0 ? "Today" : i === 1 ? "Yesterday" : d.toLocaleDateString('en-US', { weekday: 'short' }),
      dateStr: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      isSelected: isToday ? i === 0 : iso === selectedDate,
    });
  }
  
  return e('div', { className: `rounded-xl p-2.5 mb-4 border ${!isToday ? 'bg-purple-500/10 border-purple-500/30' : 'bg-zinc-800/60 border-white/5'}` },
    e('div', { className: "flex justify-between items-center mb-1.5 px-1" },
      e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "For which day?"),
      !isToday && e('span', { className: "text-[9px] bg-purple-500/30 text-purple-300 px-1.5 py-0.5 rounded font-mono-d uppercase" }, "backdating")
    ),
    e('div', { className: "flex gap-1 overflow-x-auto scrollbar-hide" },
      chips.map(d => 
        e('button', {
          key: d.iso,
          onClick: () => onChange(d.iso === todayISO ? null : d.iso),
          className: `flex-shrink-0 rounded-md px-2.5 py-1 text-[10px] font-mono-d uppercase ${d.isSelected ? 'bg-emerald-400 text-black' : 'bg-zinc-900 text-zinc-400'}`
        }, d.label)
      )
    )
  );
};

// Favorite meal chip with tap-to-add and long-press-to-edit
const FavoriteMealChip = ({ meal, onTap, onLongPress }) => {
  const pressTimerRef = uR(null);
  const longPressFiredRef = uR(false);
  
  const startPress = (ev) => {
    longPressFiredRef.current = false;
    pressTimerRef.current = setTimeout(() => {
      longPressFiredRef.current = true;
      if (navigator.vibrate) navigator.vibrate(50);
      onLongPress();
    }, 500);
  };
  
  const cancelPress = () => {
    if (pressTimerRef.current) {
      clearTimeout(pressTimerRef.current);
      pressTimerRef.current = null;
    }
  };
  
  const handleClick = () => {
    if (longPressFiredRef.current) return; // suppress click after long-press
    onTap();
  };
  
  return e('button', { 
    onClick: handleClick,
    onTouchStart: startPress,
    onTouchEnd: cancelPress,
    onTouchCancel: cancelPress,
    onTouchMove: cancelPress,
    onMouseDown: startPress,
    onMouseUp: cancelPress,
    onMouseLeave: cancelPress,
    className: "flex-shrink-0 w-32 bg-zinc-900/80 rounded-2xl p-3 border border-white/5 active:scale-95 text-left"
  },
    e('div', { className: "text-2xl mb-1" }, meal.emoji),
    e('p', { className: "text-white text-xs font-display font-semibold leading-tight line-clamp-2" }, meal.name),
    e('div', { className: "flex justify-between items-end mt-2" },
      e('span', { className: "text-emerald-400 text-xs font-display font-bold" }, meal.kcal),
      e('span', { className: "text-zinc-600 text-[9px] font-mono-d uppercase" },

      )
    )
  );
};

const BackupModal = ({ data, onClose, onImported }) => {
  const [exporting, setExporting] = uS(false);
  const [importing, setImporting] = uS(false);
  const [error, setError] = uS(null);
  const [success, setSuccess] = uS(null);
  const [confirmReplace, setConfirmReplace] = uS(false);
  const fileInputRef = uR(null);
  
  const lastBackup = data.lastBackupISO ? 
    new Date(data.lastBackupISO).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) :
    "never";
  
  const handleExport = async () => {
    setExporting(true);
    setError(null);
    try {
      await downloadBackup();
      setSuccess("Backup downloaded! Save it to iCloud Drive or email it to yourself.");
    } catch (err) {
      setError("Export failed: " + (err.message || "unknown"));
    } finally {
      setExporting(false);
    }
  };
  
  const handleImport = async (file) => {
    if (!file) return;
    if (!confirmReplace) {
      setError("Please confirm — importing will replace ALL current data.");
      return;
    }
    setImporting(true);
    setError(null);
    try {
      const result = await importBackup(file);
      setSuccess(`Restored! ${result.photoCount} photos. App will reload...`);
      setTimeout(() => onImported(), 1500);
    } catch (err) {
      setError("Import failed: " + (err.message || "Invalid backup file"));
      setImporting(false);
    }
  };
  
  return e(Modal, { onClose, title: "Backup & restore" },
    e('p', { className: "text-zinc-500 text-sm mb-5 leading-snug" }, 
      "Your data is stored only on this phone. Back up regularly to avoid losing it if Safari clears site data."

    // Status

      e('div', { className: "flex justify-between items-center mb-2" },

    estimateIngredientProtein(ing.name, ing.amount, ing.unit)
  );
  const hasUnknown = ingredientKcals.some(k => k === null);
  const estimatedTotal = ingredientKcals.reduce((sum, k) => sum + (k || 0), 0);
  const estimatedProtein = ingredientProteins.reduce((sum, p) => sum + (p || 0), 0);
  const finalKcal = overrideKcal !== "" ? parseInt(overrideKcal) || 0 : estimatedTotal;
  const finalProtein = overrideProtein !== "" ? parseFloat(overrideProtein) || 0 : estimatedProtein;
  
  const updateIngredient = (idx, field, value) => {
    const updated = [...ingredients];
    updated[idx][field] = value;
    setIngredients(updated);
  };
  
  const addIngredient = () => {
    setIngredients([...ingredients, { name: "", amount: "", unit: "g" }]);
  };
  
  const removeIngredient = (idx) => {
    if (ingredients.length === 1) {
      setIngredients([{ name: "", amount: "", unit: "g" }]);
    } else {
      setIngredients(ingredients.filter((_, i) => i !== idx));
    }
  };
  
  return e(Modal, { onClose, title: "Log a meal" },

  const [name, setName] = uS(meal.name);

  const [ingredients, setIngredients] = uS(meal.ingredients && meal.ingredients.length > 0 ? meal.ingredients : []);
  const [kcal, setKcal] = uS(String(meal.kcal));
  const [protein, setProtein] = uS(String(meal.protein || 0));
  const [overrideKcal, setOverrideKcal] = uS(false);
  const [overrideProtein, setOverrideProtein] = uS(false);
  
  const ingredientKcals = ingredients.map(ing => 
    estimateIngredientKcal(ing.name, ing.amount, ing.unit)
  );
  const ingredientProteins = ingredients.map(ing => 
    estimateIngredientProtein(ing.name, ing.amount, ing.unit)
  );
  const estimatedTotal = ingredientKcals.reduce((sum, k) => sum + (k || 0), 0);
  const estimatedProtein = ingredientProteins.reduce((sum, p) => sum + (p || 0), 0);
  const finalKcal = overrideKcal || ingredients.length === 0 ? parseInt(kcal) || 0 : estimatedTotal;
  const finalProtein = overrideProtein || ingredients.length === 0 ? parseFloat(protein) || 0 : estimatedProtein;
  
  const updateIngredient = (idx, field, value) => {
    const updated = [...ingredients];
    updated[idx][field] = value;
    setIngredients(updated);
    if (!overrideKcal) {
      const newKcals = updated.map(ing => estimateIngredientKcal(ing.name, ing.amount, ing.unit));
      const newTotal = newKcals.reduce((s, k) => s + (k || 0), 0);

const EditWorkoutModal = ({ workout, bodyWeight, workoutHistory, trainingGoal, onClose, onSave, onDelete }) => {
  const [w, setW] = uS(JSON.parse(JSON.stringify(workout)));
  const [kcalEdited, setKcalEdited] = uS(false);
  const [showSuggestions, setShowSuggestions] = uS(true);
  
  // Compute progressive overload suggestions
  const suggestions = generateWorkoutSuggestions(w, workoutHistory || [], trainingGoal || "progressive_overload");
  const suggestionMap = {};
  suggestions.forEach(s => { suggestionMap[s.exerciseName.toLowerCase()] = s; });
  const goalConfig = TRAINING_GOALS[trainingGoal] || TRAINING_GOALS.progressive_overload;
  
  // Recompute total volume
  const recalcVolume = (workout) => {
    let total = 0;
    for (const ex of workout.exercises) {
      for (const s of ex.sets) {
        if (s.weight && s.reps) total += s.weight * s.reps;
      }
    }
    return Math.round(total);
  };
  
  // Recompute kcal from MET formula
  const recalcKcal = (duration) => {
    return Math.round(5.5 * (bodyWeight || 75) * (duration / 60));
  };
  
  const updateSet = (exIdx, setIdx, field, value) => {
    const updated = { ...w };
    updated.exercises[exIdx].sets[setIdx][field] = value === "" ? "" : parseFloat(value);
    updated.totalVolume = recalcVolume(updated);
    setW(updated);
  };
  
  const removeSet = (exIdx, setIdx) => {
    const updated = { ...w };
    updated.exercises[exIdx].sets.splice(setIdx, 1);
    updated.totalVolume = recalcVolume(updated);
    setW(updated);
  };
  
  const removeExercise = (exIdx) => {
    const updated = { ...w };
    updated.exercises.splice(exIdx, 1);
    updated.totalVolume = recalcVolume(updated);
    setW(updated);
  };
  
  const updateDuration = (newDuration) => {
    const dur = parseInt(newDuration) || 0;
    const updated = { ...w, duration: dur };
    // Auto-recalc kcal unless user has manually overridden
    if (!kcalEdited) {
      updated.kcal = recalcKcal(dur);
    }
    setW(updated);
  };
  
  const updateKcal = (newKcal) => {
    setKcalEdited(true);
    setW({ ...w, kcal: parseInt(newKcal) || 0 });
  };
  
  return e(Modal, { onClose, title: "Edit workout", subtitle: "Tap any value to change it" },
    // Workout meta
    e('div', { className: "grid grid-cols-2 gap-2 mb-4" },
      e('div', { className: "bg-zinc-800 rounded-xl p-3" },
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase mb-1" }, "Name"),
        e('input', {
          value: w.name,
          onChange: (ev) => setW({ ...w, name: ev.target.value }),
          className: "w-full bg-transparent text-white font-display font-semibold outline-none"
        })
      ),
      e('div', { className: "bg-zinc-800 rounded-xl p-3" },
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase mb-1" }, "Duration (min)"),
        e('input', {
          value: w.duration,
          type: "number",
          onChange: (ev) => updateDuration(ev.target.value),
          className: "w-full bg-transparent text-white font-display font-semibold outline-none"
        })
      )
    ),
    
    // ─── WORKOUT DATE PICKER ───
    (() => {
      const todayStr = new Date().toDateString();
      // Determine which day this workout belongs to
      const currentDateStr = w.date || todayStr;
      const isToday = currentDateStr === todayStr;
      // Convert to YYYY-MM-DD for the date input
      const currentDateForInput = (() => {
        const d = new Date(currentDateStr);
        return toLocalISO(d);
      })();
      
      const setWorkoutDate = (newISO) => {
        const newD = fromLocalISO(newISO);
        newD.setHours(12, 0, 0, 0);
        const newDateStr = newD.toDateString();
        const newIsToday = newDateStr === todayStr;
        setW({ 
          ...w, 
          date: newDateStr,
          dateISO: newD.toISOString(),
          backdated: !newIsToday,
        });
      };
      
      // Quick-pick chips (today + last 7 days)
      const chips = [];
      for (let i = 0; i < 8; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        chips.push({
          iso: toLocalISO(d),
          label: i === 0 ? "Today" : i === 1 ? "Yesterday" : d.toLocaleDateString('en-US', { weekday: 'short' }),
          isSelected: toLocalISO(d) === currentDateForInput,
        });
      }
      
      return e('div', { className: `rounded-xl p-3 mb-4 border ${!isToday ? 'bg-purple-500/10 border-purple-500/30' : 'bg-zinc-800 border-white/5'}` },
        e('div', { className: "flex justify-between items-center mb-2" },
          e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase flex items-center gap-1" },
            e(Icon, { d: icons.clock, size: 10 }),
            "Workout date"
          ),
          !isToday && e('span', { className: "text-[9px] bg-purple-500/30 text-purple-300 px-1.5 py-0.5 rounded font-mono-d uppercase" }, "backdated")
        ),
        e('p', { className: "text-white font-display font-bold text-sm mb-2" }, 
          new Date(currentDateStr).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' })
        ),
        e('div', { className: "flex gap-1.5 overflow-x-auto scrollbar-hide pb-1 mb-2" },
          chips.map(c => e('button', {
            key: c.iso,
            onClick: () => setWorkoutDate(c.iso),
            className: `flex-shrink-0 rounded-md px-2.5 py-1 text-[10px] font-mono-d uppercase ${c.isSelected ? 'bg-emerald-400 text-black' : 'bg-zinc-900 text-zinc-400'}`
          }, c.label))
        ),
        e('input', {
          type: "date",
          value: currentDateForInput,
          max: toLocalISO(new Date()),
          onChange: (ev) => { if (ev.target.value) setWorkoutDate(ev.target.value); },
          className: "w-full bg-zinc-900 text-white rounded-lg px-3 py-2 text-xs font-mono-d outline-none focus:ring-2 focus:ring-emerald-400"
        })
      );
    })(),
    e('div', { className: "bg-orange-500/10 border border-orange-500/20 rounded-xl p-3 mb-2" },
      e('p', { className: "text-[9px] text-orange-400 font-mono-d uppercase mb-1 flex items-center justify-between" }, 
        "Calories burned",
        kcalEdited && e('span', { className: "text-zinc-500" }, "manually set")
      ),
      e('input', {
        value: w.kcal,
        type: "number",
        onChange: (ev) => updateKcal(ev.target.value),
        className: "w-full bg-transparent text-white font-display font-bold text-xl outline-none"
      })
    ),
    e('p', { className: "text-[9px] text-zinc-600 font-mono-d mb-4 text-center" }, 
      kcalEdited ? "↻ Tap reset to use auto-estimate" : `Auto-estimated from duration · ${w.totalVolume ? `vol ${(w.totalVolume/1000).toFixed(1)}t` : ''}`

const renderWeightChart = (data, weightToGoal, weightLost) => {
  const points = data.weightHistory.map(w => w.weight);
  const minW = Math.min(...points, data.targetWeight) - 0.5;
  const maxW = Math.max(...points) + 0.5;
  const range = maxW - minW;
  
  return e('div', null,
    e('div', { className: "relative h-44 mt-4 mb-2" },
      e('div', { 
        className: "absolute inset-x-0 border-t border-dashed border-emerald-400/40",
        style: { top: `${((maxW - data.targetWeight) / range) * 100}%` }
      },
        e('span', { className: "absolute -top-2 right-0 text-[9px] font-mono-d bg-emerald-400/20 text-emerald-300 px-1.5 py-0.5 rounded" },

      ),
      e('svg', { className: "w-full h-full", viewBox: "0 0 280 160", preserveAspectRatio: "none" },
        e('defs', null,
          e('linearGradient', { id: "weightGrad", x1: "0%", y1: "0%", x2: "0%", y2: "100%" },
            e('stop', { offset: "0%", stopColor: "rgb(168, 85, 247)", stopOpacity: "0.4" }),
            e('stop', { offset: "100%", stopColor: "rgb(168, 85, 247)", stopOpacity: "0" })
          )
        ),
        e('path', {
          d: `M 0,${((maxW - points[0]) / range) * 160} ${points.map((v, i) => `L ${(i/(points.length-1))*280},${((maxW - v) / range) * 160}`).join(' ')} L 280,160 L 0,160 Z`,
          fill: "url(#weightGrad)"
        }),
        e('path', {
          d: `M 0,${((maxW - points[0]) / range) * 160} ${points.map((v, i) => `L ${(i/(points.length-1))*280},${((maxW - v) / range) * 160}`).join(' ')}`,
          stroke: "rgb(192, 132, 252)", strokeWidth: "2.5", fill: "none", strokeLinecap: "round"
        }),
        points.map((v, i) => e('circle', {
          key: i,
          cx: (i/(points.length-1))*280,
          cy: ((maxW - v) / range) * 160,
          r: i === points.length - 1 ? "4" : "3",

          stroke: "black",

      )

    e('div', { className: "grid grid-cols-3 gap-2 mt-5 pt-4 border-t border-white/5" },
      e('div', null,

        e('p', { className: "text-emerald-400 font-display font-bold" }, `-${weightLost}kg`)
      ),
      e('div', null,
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "To goal"),
        e('p', { className: "text-purple-400 font-display font-bold" }, `-${weightToGoal}kg`)
      )
    )
  );
};

// ============ SLEEP CHART ============
const renderSleepChart = (sleepData) => {
  // Show last 14 nights
  const recent = sleepData.slice(-14);
  const avg = recent.reduce((s, d) => s + d.hours, 0) / recent.length;
  const last7 = recent.slice(-7);
  const prev7 = recent.slice(-14, -7);
  const last7Avg = last7.length > 0 ? last7.reduce((s, d) => s + d.hours, 0) / last7.length : 0;
  const prev7Avg = prev7.length > 0 ? prev7.reduce((s, d) => s + d.hours, 0) / prev7.length : 0;
  const trend = prev7.length >= 3 ? (last7Avg - prev7Avg) : 0;
  
  // Bar chart
  const maxHours = 10;
  const goalHours = 8;
  
  return e('div', null,
    e('div', { className: "relative h-32 flex items-end gap-1 mt-4" },
      // Goal line
      e('div', { 
        className: "absolute inset-x-0 border-t border-dashed border-emerald-400/30",
        style: { top: `${((maxHours - goalHours) / maxHours) * 100}%` }
      },
        e('span', { className: "absolute -top-2 right-0 text-[9px] font-mono-d bg-emerald-400/20 text-emerald-300 px-1.5 py-0.5 rounded" }, 
          "8h"
        )
      ),
      recent.map((d, i) => {
        const heightPct = (d.hours / maxHours) * 100;
        const isLow = d.hours < 6;
        const isGood = d.hours >= 7.5;
        const colorClass = isLow ? "bg-rose-400/70" : isGood ? "bg-indigo-400" : "bg-indigo-500/50";
        return e('div', { 
          key: i,
          className: "flex-1 flex flex-col items-center justify-end h-full"
        },
          e('div', { 
            className: `w-full rounded-t-md ${colorClass}`,
            style: { height: `${heightPct}%`, minHeight: '4px' }
          })
        );
      })
    ),
    // Day labels (just first/middle/last)
    recent.length >= 3 && e('div', { className: "flex justify-between mt-2" },
      e('span', { className: "text-[9px] text-zinc-600 font-mono-d" }, 
        new Date(recent[0].dateISO).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      ),
      e('span', { className: "text-[9px] text-zinc-600 font-mono-d" }, 
        new Date(recent[recent.length - 1].dateISO).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      )
    ),
    e('div', { className: "grid grid-cols-3 gap-2 mt-5 pt-4 border-t border-white/5" },
      e('div', null,
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Avg"),
        e('p', { className: "text-white font-display font-bold" }, `${avg.toFixed(1)}h`)
      ),
      e('div', null,
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Last 7d"),
        e('p', { className: "text-indigo-400 font-display font-bold" }, 
          last7.length > 0 ? `${last7Avg.toFixed(1)}h` : "—"
        )
      ),
      e('div', null,
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Trend"),
        e('p', { className: `font-display font-bold ${trend > 0.2 ? 'text-emerald-400' : trend < -0.2 ? 'text-rose-400' : 'text-zinc-400'}` }, 
          prev7.length >= 3 ? 
            `${trend > 0 ? '+' : ''}${trend.toFixed(1)}h` : 
            "—"
        )
      )
    )
  );
};

// ============ WHAT IF TAB COMPONENT ============
const WhatIfTab = ({ data, totalEaten, totalBurned, tdee, balance, goalRange }) => {
  const [extraEat, setExtraEat] = uS(0);
  const [extraBurn, setExtraBurn] = uS(0);
  const [extraSteps, setExtraSteps] = uS(0);
  
  // Steps burn ~0.04 kcal per step for 75kg person, scale with weight
  const stepsBurn = Math.round(extraSteps * 0.04 * (data.bodyWeight / 75));
  
  // Calculate adjusted balance
  const newEaten = totalEaten + parseInt(extraEat || 0);
  const newBurned = totalBurned + parseInt(extraBurn || 0) + stepsBurn;
  const newBalance = newEaten - tdee - newBurned;
  
  const isOnTrack = newBalance >= goalRange.min && newBalance <= goalRange.max;
  const isTooAggressive = data.goalType === "cut" ? newBalance < goalRange.min : newBalance > goalRange.max;
  
  // Generate suggestions to get back on track
  const generateOffTrackSuggestions = () => {
    const suggestions = [];
    
    if (data.goalType === "cut") {
      // Need a deficit between -750 and -300
      if (newBalance > goalRange.max) {
        // Not enough deficit — need to burn more or eat less
        const gap = newBalance - goalRange.target; // how much surplus to remove
        suggestions.push({
          emoji: "🚶",
          title: `Walk ${Math.ceil(gap / 5)} minutes`,
          detail: `A brisk walk burns ~5 kcal/min. ${Math.ceil(gap / 5)} min = ~${Math.ceil(gap / 5) * 5} kcal`,
          action: () => setExtraBurn(parseInt(extraBurn || 0) + Math.ceil(gap / 5) * 5)
        });
        suggestions.push({
          emoji: "🪜",
          title: `StairMaster +${Math.ceil(gap / 12)} min`,
          detail: `StairMaster level 8-9 burns ~12 kcal/min. Adds ~${Math.ceil(gap / 12) * 12} kcal burn`,
          action: () => setExtraBurn(parseInt(extraBurn || 0) + Math.ceil(gap / 12) * 12)
        });
        suggestions.push({
          emoji: "🍽️",
          title: `Eat ${Math.round(gap)} fewer kcal today`,
          detail: `Skip a snack or reduce portion sizes to close the gap`,
          action: () => setExtraEat(parseInt(extraEat || 0) - Math.round(gap))
        });
      } else if (newBalance < goalRange.min) {
        // Deficit too aggressive
        const needed = goalRange.min - newBalance;
        suggestions.push({
          emoji: "🥜",
          title: `Add ${Math.round(Math.abs(needed))} kcal`,
          detail: `Deficit is risky — eat more protein or carbs`,
          action: () => setExtraEat(parseInt(extraEat || 0) + Math.round(Math.abs(needed)))
        });
      }
    } else if (data.goalType === "bulk") {
      if (newBalance < goalRange.min) {
        const needed = goalRange.target - newBalance;
        suggestions.push({
          emoji: "🍚",
          title: `Eat ${Math.round(needed)} more kcal`,
          detail: `Add carbs + protein to hit your bulk target`,
          action: () => setExtraEat(parseInt(extraEat || 0) + Math.round(needed))
        });
      } else if (newBalance > goalRange.max) {
        const surplus = newBalance - goalRange.target;
        suggestions.push({
          emoji: "🚶",
          title: `Walk ${Math.ceil(surplus / 5)} min to lean bulk`,
          detail: `Surplus too high — risks fat gain. Burn ~${Math.ceil(surplus / 5) * 5} kcal`,
          action: () => setExtraBurn(parseInt(extraBurn || 0) + Math.ceil(surplus / 5) * 5)
        });
      }
    }
    
    return suggestions;
  };
  
  const suggestions = generateOffTrackSuggestions();
  
  return e('div', { className: "px-5 pt-4" },
    e('div', { className: "mb-6" },
      e('p', { className: "text-zinc-500 text-sm font-mono-d uppercase tracking-wider" }, "Calculator"),
      e('h1', { className: "text-white text-3xl font-display font-bold flex items-center gap-2" }, 
        "What if",
        e('span', { className: "text-emerald-400" }, "?")
      )
    ),
    
    e('p', { className: "text-zinc-500 text-sm mb-5 leading-snug" }, 
      "Plan ahead — see how extra food, exercise, or steps affect your daily balance."
    ),
    
    // Current state
    e('div', { className: "bg-zinc-900/80 rounded-2xl p-4 mb-4 border border-white/5" },
      e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase mb-2" }, "Current today"),
      e('div', { className: "grid grid-cols-3 gap-2" },
        e('div', null,
          e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Eaten"),
          e('p', { className: "text-cyan-300 font-display font-bold" }, totalEaten)
        ),
        e('div', null,
          e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Burned"),
          e('p', { className: "text-orange-300 font-display font-bold" }, tdee + totalBurned)
        ),
        e('div', null,
          e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Balance"),
          e('p', { className: `font-display font-bold ${balance < 0 ? 'text-emerald-400' : 'text-orange-400'}` }, 
            balance > 0 ? '+' : '',
            balance
          )
        )
      )
    ),
    
    // Sliders / inputs
    e('div', { className: "space-y-3 mb-4" },
      // Extra food
      e('div', { className: "bg-zinc-900/80 rounded-2xl p-4 border border-white/5" },
        e('div', { className: "flex justify-between items-center mb-3" },
          e('div', { className: "flex items-center gap-2" },
            e('span', { className: "text-2xl" }, "🍽️"),
            e('p', { className: "text-white font-display font-semibold text-sm" }, "Extra food")
          ),
          e('p', { className: `font-display font-bold ${extraEat > 0 ? 'text-cyan-400' : 'text-zinc-500'}` }, 
            extraEat > 0 ? `+${extraEat}` : extraEat,
            e('span', { className: "text-xs text-zinc-500 ml-1" }, "kcal")
          )
        ),
        e('input', {
          type: "range",
          min: -800,
          max: 1500,
          step: 50,
          value: extraEat,
          onChange: (ev) => setExtraEat(parseInt(ev.target.value)),
          className: "w-full accent-cyan-400"
        }),
        e('div', { className: "flex gap-1.5 mt-2" },
          [
            { v: 200, label: "snack" },
            { v: 500, label: "meal" },
            { v: 800, label: "big meal" },
            { v: 0, label: "reset" },
          ].map(p => 
            e('button', { 
              key: p.label,
              onClick: () => setExtraEat(p.v),
              className: "flex-1 bg-zinc-800 text-zinc-400 rounded-lg py-1.5 text-[10px] font-mono-d uppercase active:scale-95"
            }, p.label)
          )
        )
      ),
      
      // Extra workout burn
      e('div', { className: "bg-zinc-900/80 rounded-2xl p-4 border border-white/5" },
        e('div', { className: "flex justify-between items-center mb-3" },
          e('div', { className: "flex items-center gap-2" },
            e('span', { className: "text-2xl" }, "🔥"),
            e('p', { className: "text-white font-display font-semibold text-sm" }, "Extra cardio/workout")
          ),
          e('p', { className: `font-display font-bold ${extraBurn > 0 ? 'text-orange-400' : 'text-zinc-500'}` }, 
            extraBurn > 0 ? `−${extraBurn}` : extraBurn,
            e('span', { className: "text-xs text-zinc-500 ml-1" }, "kcal")
          )
        ),
        e('input', {
          type: "range",
          min: 0,
          max: 800,
          step: 25,
          value: extraBurn,
          onChange: (ev) => setExtraBurn(parseInt(ev.target.value)),
          className: "w-full accent-orange-400"
        }),
        e('div', { className: "flex gap-1.5 mt-2" },
          [
            { v: 100, label: "20m walk" },
            { v: 200, label: "30m run" },
            { v: 350, label: "45m hard" },
            { v: 0, label: "reset" },
          ].map(p => 
            e('button', { 
              key: p.label,
              onClick: () => setExtraBurn(p.v),
              className: "flex-1 bg-zinc-800 text-zinc-400 rounded-lg py-1.5 text-[10px] font-mono-d uppercase active:scale-95"
            }, p.label)
          )
        )
      ),
      
      // Extra steps
      e('div', { className: "bg-zinc-900/80 rounded-2xl p-4 border border-white/5" },
        e('div', { className: "flex justify-between items-center mb-3" },
          e('div', { className: "flex items-center gap-2" },
            e('span', { className: "text-2xl" }, "👟"),
            e('p', { className: "text-white font-display font-semibold text-sm" }, "Extra steps")
          ),
          e('div', { className: "text-right" },
            e('p', { className: `font-display font-bold ${extraSteps > 0 ? 'text-emerald-400' : 'text-zinc-500'}` }, 
              extraSteps > 0 ? `+${extraSteps}` : extraSteps
            ),
            e('p', { className: "text-[10px] text-zinc-500 font-mono-d" }, 
              extraSteps > 0 ? `~−${stepsBurn} kcal` : ""
            )
          )
        ),
        e('input', {
          type: "range",
          min: 0,
          max: 15000,
          step: 500,
          value: extraSteps,
          onChange: (ev) => setExtraSteps(parseInt(ev.target.value)),
          className: "w-full accent-emerald-400"
        })
      )
    ),
    
    // Result
    e('div', { 
      className: `rounded-3xl p-5 mb-4 border ${
        isOnTrack ? 'bg-gradient-to-br from-emerald-500/20 to-cyan-500/10 border-emerald-500/30' :
        isTooAggressive ? 'bg-gradient-to-br from-rose-500/20 to-orange-500/10 border-rose-500/30' :
        'bg-gradient-to-br from-yellow-500/20 to-orange-500/10 border-yellow-500/30'
      }`
    },
      e('div', { className: "flex justify-between items-start mb-4" },
        e('div', null,
          e('p', { className: "text-zinc-400 text-[10px] font-mono-d uppercase tracking-widest mb-1" }, "New balance"),
          e('div', { className: "flex items-baseline gap-2" },
            e('span', { 
              className: `text-4xl font-display font-bold ${newBalance < 0 ? 'text-emerald-300' : newBalance > 0 ? 'text-orange-300' : 'text-white'}`
            }, 
              newBalance > 0 ? '+' : '',
              newBalance
            ),
            e('span', { className: "text-zinc-500 text-xs font-mono-d" }, "kcal")
          )
        ),
        e('div', { className: "text-right" },
          e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "vs current"),
          e('p', { 
            className: `text-sm font-mono-d font-bold ${(newBalance - balance) < 0 ? 'text-emerald-300' : (newBalance - balance) > 0 ? 'text-orange-300' : 'text-zinc-400'}`
          },
            newBalance - balance > 0 ? '+' : '',
            newBalance - balance,
            " kcal"
          )
        )
      ),
      
      // Status badge
      e('div', { className: "flex items-center justify-between" },
        e('p', { 
          className: `text-sm font-display font-semibold ${
            isOnTrack ? 'text-emerald-300' :
            isTooAggressive ? 'text-rose-300' :
            'text-yellow-300'
          }`
        }, 
          isOnTrack ? "✓ On track for your " + data.goalType :
          isTooAggressive ? "⚠ Too aggressive" :
          data.goalType === "cut" ? "Not enough deficit" :
          data.goalType === "bulk" ? "Not enough surplus" :
          "Off balance"
        ),
        e('span', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, 
          `target: ${goalRange.min} to ${goalRange.max}`
        )
      )
    ),
    
    // Off-track suggestions
    !isOnTrack && suggestions.length > 0 && e('div', { className: "mb-4" },
      e('h3', { className: "text-white font-display font-semibold mb-3 flex items-center gap-2" },
        e(Icon, { d: icons.bulb, size: 16, className: "text-yellow-400" }),
        "Get back on track"
      ),
      e('div', { className: "space-y-2" },
        suggestions.map((s, i) => 
          e('button', {
            key: i,
            onClick: s.action,
            className: "w-full bg-zinc-900/80 rounded-2xl p-4 border border-white/5 active:scale-[0.98] text-left flex items-center gap-3"
          },
            e('div', { className: "text-2xl flex-shrink-0" }, s.emoji),
            e('div', { className: "flex-1" },
              e('p', { className: "text-white font-display font-semibold text-sm" }, s.title),
              e('p', { className: "text-zinc-400 text-xs leading-snug" }, s.detail)
            ),
            e('div', { className: "text-emerald-400 text-xs font-mono-d uppercase" }, "apply")
          )
        )
      )
    ),
    
    // Reset button
    (extraEat !== 0 || extraBurn !== 0 || extraSteps !== 0) && e('button', { 
      onClick: () => { setExtraEat(0); setExtraBurn(0); setExtraSteps(0); },
      className: "w-full bg-zinc-800 text-zinc-400 rounded-xl py-3 font-display font-semibold text-sm mb-4"
    }, "↻ Reset all")
  );
};

// ============ PHOTO THUMBNAIL ============
const PhotoThumbnail = ({ photo, onClick }) => {
  const [url, setUrl] = uS(null);
  
  uE(() => {
    const blob = photo.thumbnail || photo.blob;
    const u = URL.createObjectURL(blob);
    setUrl(u);
    return () => URL.revokeObjectURL(u);
  }, [photo.id]);
  
  const dateStr = new Date(photo.dateISO).toLocaleDateString('en-US', { 
    month: 'short', day: 'numeric' 
  });
  
  return e('button', { 
    onClick,
    className: "relative aspect-[3/4] rounded-xl overflow-hidden bg-zinc-800 active:scale-[0.97] transition"
  },
    url && e('img', { 
      src: url,
      className: "w-full h-full object-cover"
    }),
    // Date overlay
    e('div', { className: "absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-2" },
      e('p', { className: "text-white text-[10px] font-mono-d font-bold" }, dateStr),
      photo.weight && e('p', { className: "text-zinc-300 text-[9px] font-mono-d" }, `${photo.weight}kg`)
    ),
    // Angle badge
    e('div', { className: "absolute top-1.5 right-1.5 bg-black/60 backdrop-blur rounded-full w-6 h-6 flex items-center justify-center text-xs" }, 
      photo.angle === 'side' ? '🚶' : photo.angle === 'back' ? '🧍‍♂️' : '🧍'
    )
  );
};

// ============ EXERCISE PROGRESS CARD ============
const renderExerciseProgressCard = (ex) => {
  const sessions = ex.sessions;
  const isCardio = sessions[0].type === "cardio";
  const last = sessions[sessions.length - 1];
  const first = sessions[0];
  
  if (isCardio) {
    // Cardio progress
    const points = sessions.map(s => s.totalDuration);
    const minP = Math.min(...points);
    const maxP = Math.max(...points) || 1;
    const trend = sessions.length >= 2 ? last.totalDuration - first.totalDuration : 0;
    
    return e('div', { 
      key: ex.name,
      className: "bg-zinc-900/80 rounded-2xl p-4 border border-white/5"
    },
      e('div', { className: "flex justify-between items-start mb-2" },
        e('div', { className: "flex-1 min-w-0" },
          e('p', { className: "text-white font-display font-semibold text-sm truncate" }, ex.name),
          e('p', { className: "text-zinc-500 text-[10px] font-mono-d" }, 
            `${sessions.length} session${sessions.length > 1 ? 's' : ''} · ${last.totalDuration}min lvl ${last.avgLevel}`
          )
        ),
        e('span', { 
          className: `text-[10px] font-mono-d uppercase ${trend > 0 ? 'text-emerald-400' : trend < 0 ? 'text-rose-400' : 'text-zinc-500'}` 
        },
          sessions.length >= 2 ? `${trend > 0 ? '+' : ''}${trend}min` : "—"
        )
      ),
      // Mini chart
      sessions.length >= 2 && e('div', { className: "flex items-end gap-0.5 h-8 mt-2" },
        points.map((v, i) => e('div', {
          key: i,
          className: `flex-1 rounded-sm ${i === points.length - 1 ? 'bg-orange-400' : 'bg-zinc-700'}`,
          style: { 
            height: `${maxP === minP ? 50 : ((v - minP) / (maxP - minP)) * 80 + 20}%`,
            minHeight: '3px'
          }
        }))
      )
    );
  }
  
  // Strength progress
  const oneRMPoints = sessions.map(s => s.oneRMEstimate);
  const minRM = Math.min(...oneRMPoints);
  const maxRM = Math.max(...oneRMPoints);
  const range = maxRM - minRM || 1;
  const trend = sessions.length >= 2 ? last.oneRMEstimate - first.oneRMEstimate : 0;
  const lastBest = last.bestSet;
  
  return e('div', { 
    key: ex.name,
    className: "bg-zinc-900/80 rounded-2xl p-4 border border-white/5"
  },
    e('div', { className: "flex justify-between items-start mb-2" },
      e('div', { className: "flex-1 min-w-0" },
        e('p', { className: "text-white font-display font-semibold text-sm truncate" }, ex.name),
        e('p', { className: "text-zinc-500 text-[10px] font-mono-d" }, 
          `${sessions.length} session${sessions.length > 1 ? 's' : ''} · last: ${lastBest.weight}kg × ${lastBest.reps}`
        )
      ),
      e('div', { className: "text-right ml-2" },
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Est. 1RM"),
        e('div', { className: "flex items-baseline gap-1" },
          e('span', { className: "text-orange-400 font-display font-bold text-lg" }, last.oneRMEstimate),
          e('span', { className: "text-[10px] text-zinc-500 font-mono-d" }, "kg")
        ),
        sessions.length >= 2 && e('p', { 
          className: `text-[9px] font-mono-d ${trend > 0 ? 'text-emerald-400' : trend < 0 ? 'text-rose-400' : 'text-zinc-500'}` 
        }, `${trend > 0 ? '+' : ''}${trend}kg`)
      )
    ),
    // Mini chart
    sessions.length >= 2 && e('div', { className: "flex items-end gap-0.5 h-8 mt-2" },
      oneRMPoints.map((v, i) => e('div', {
        key: i,
        className: `flex-1 rounded-sm ${i === oneRMPoints.length - 1 ? 'bg-orange-400' : 'bg-zinc-700'}`,
        style: { 
          height: `${minRM === maxRM ? 50 : ((v - minRM) / range) * 80 + 20}%`,
          minHeight: '3px'
        }
      }))
    )
  );
};

(async () => {
  try { await autoSyncFromInflux(); } catch (e) {}
  createRoot(document.getElementById('root')).render(e(App));
})();</script>

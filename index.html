// Estimate kcal for an ingredient
const estimateIngredientKcal = (name, amount, unit) => {
  if (!name || !amount) return 0;
  const key = name.toLowerCase().trim();
  
  // Try exact match, then partial match
  let food = FOOD_DB[key];
  if (!food) {
    // Try to find a partial match
    const matches = Object.keys(FOOD_DB).filter(k => 
      key.includes(k) || k.includes(key)
    ).sort((a, b) => b.length - a.length); // longest match wins
    if (matches.length > 0) food = FOOD_DB[matches[0]];
  }
  if (!food) return null; // unknown food
  
  const amt = parseFloat(amount);
  if (isNaN(amt)) return 0;
  
  // Convert amount to base unit (food.unit is per 100g/100ml/1 piece)
  if (food.unit === "piece") {
    return Math.round(food.kcal * amt);
  }
  
  // Handle unit conversion
  let amtInBaseUnit = amt;
  if (unit === "kg") amtInBaseUnit = amt * 1000;
  else if (unit === "l") amtInBaseUnit = amt * 1000;
  else if (unit === "tbsp") amtInBaseUnit = amt * 15; // ~15g/ml
  else if (unit === "tsp") amtInBaseUnit = amt * 5;
  else if (unit === "cup") amtInBaseUnit = amt * 240;
  else if (unit === "oz") amtInBaseUnit = amt * 28;
  // g, ml stay as-is
  
  return Math.round((food.kcal * amtInBaseUnit) / 100);
};

// Estimate protein (g) for an ingredient
const estimateIngredientProtein = (name, amount, unit) => {
  if (!name || !amount) return 0;
  const key = name.toLowerCase().trim();
  let food = FOOD_DB[key];
  if (!food) {
    const matches = Object.keys(FOOD_DB).filter(k => 
      key.includes(k) || k.includes(key)
    ).sort((a, b) => b.length - a.length);
    if (matches.length > 0) food = FOOD_DB[matches[0]];
  }
  if (!food || food.protein === undefined) return 0;
  
  const amt = parseFloat(amount);
  if (isNaN(amt)) return 0;
  
  if (food.unit === "piece") {
    return Math.round(food.protein * amt * 10) / 10;
  }
  
  let amtInBaseUnit = amt;
  if (unit === "kg") amtInBaseUnit = amt * 1000;
  else if (unit === "l") amtInBaseUnit = amt * 1000;
  else if (unit === "tbsp") amtInBaseUnit = amt * 15;
  else if (unit === "tsp") amtInBaseUnit = amt * 5;
  else if (unit === "cup") amtInBaseUnit = amt * 240;
  else if (unit === "oz") amtInBaseUnit = amt * 28;
  
  return Math.round(((food.protein * amtInBaseUnit) / 100) * 10) / 10;
};

// All dates use LOCAL time. Never use toISOString() which is UTC.

const toLocalISO = (d) => {
  // Returns "YYYY-MM-DD" using local time, NOT UTC.
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
};
const fromLocalISO = (iso) => {
  // Parses "YYYY-MM-DD" as local time, NOT UTC.
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
};
const todayLocalISO = () => toLocalISO(new Date());

const stepsFromEntries = (entries) => {
  if (!entries || entries.length === 0) return 0;
  return Math.max(...entries.map(e => e.count || 0));
};

// ============== BMR / TDEE CALCULATIONS ==============
// Mifflin-St Jeor formula — most accurate for general population
const calculateBMR = (data) => {
  const { bodyWeight: w, height: h, age, sex } = data;
  if (sex === "male") {
    return Math.round(10 * w + 6.25 * h - 5 * age + 5);
  } else {
    return Math.round(10 * w + 6.25 * h - 5 * age - 161);
  }
};

// TDEE = BMR × activity multiplier (excluding planned exercise — that's added separately)
const calculateTDEE = (data) => {
  return Math.round(calculateBMR(data) * data.activityLevel);
};

// Healthy deficit/surplus ranges per goal
const getGoalRange = (goalType, tdee) => {
  if (goalType === "cut") return { min: -750, max: -300, label: "deficit", target: -500 };
  if (goalType === "bulk") return { min: 200, max: 500, label: "surplus", target: 350 };
  return { min: -100, max: 100, label: "balance", target: 0 };
};

// ============== SMART TIPS ENGINE ==============
// Generates personalized suggestions based on the day's data
const generateSmartTips = (data, balance, tdee, isOnTrack, isTooAggressive, totalBurned) => {
  const tips = [];
  const hour = new Date().getHours();
  const goalRange = getGoalRange(data.goalType, tdee);
  const stepProgress = data.steps / data.stepsGoal;
  
  // Energy balance tips
  if (data.goalType === "cut") {
    if (balance > 100 && hour >= 14) {
      // Eating too much for cutting goal
      const surplus = balance - goalRange.target;
      const walkMinutes = Math.round(surplus / 5); // ~5 kcal/min walking
      tips.push({
        emoji: "🚶",
        title: `Take a ${Math.min(60, Math.max(15, walkMinutes))}-min walk`,
        detail: `You're ${balance > 0 ? 'in surplus' : 'short of deficit'}. A walk burns ~${Math.min(300, walkMinutes * 5)} kcal and helps hit your cut goal.`
      });
    } else if (isTooAggressive && hour >= 17) {
      // Deficit too aggressive — need to eat more
      const needed = goalRange.min - balance;
      tips.push({
        emoji: "🥜",
        title: `Eat ${Math.abs(needed)} more kcal`,
        detail: "Your deficit is too aggressive — risks muscle loss and slowed metabolism. Add a protein snack like nuts, yogurt, or a shake."
      });
    } else if (isOnTrack && hour >= 18) {
      tips.push({
        emoji: "🎯",
        title: "Perfect deficit today",
        detail: `${Math.abs(balance)} kcal deficit — sustainable for steady fat loss without losing muscle.`
      });
    }
  } else if (data.goalType === "bulk") {
    if (balance < goalRange.min && hour >= 14) {
      const needed = goalRange.target - balance;
      tips.push({
        emoji: "🍚",
        title: `Add ${needed} kcal to grow`,
        detail: "Not enough surplus for muscle gain. Add carbs + protein — rice + chicken, oats + peanut butter, or a calorie shake."
      });
    }
  }
  
  // Step count tips — use time-of-day expected pace
  // Assume waking hours are 8am-10pm (14 hours). Linear pace: hour H → (H-8)/14 * goal.
  if (hour >= 10 && hour < 22) {
    const expectedProgress = Math.max(0, Math.min(1, (hour - 8) / 14));
    const expectedSteps = Math.round(data.stepsGoal * expectedProgress);
    const stepGap = expectedSteps - data.steps;
    
    if (stepGap > 1500) {
      // Significantly behind pace
      const remaining = data.stepsGoal - data.steps;
      const walkMin = Math.round(stepGap / 100); // ~100 steps/min walking
      tips.push({
        emoji: "👟",
        title: `It's ${hour}:00 and you're behind on steps`,
        detail: `${data.steps.toLocaleString()} logged, ~${expectedSteps.toLocaleString()} expected by now. A ${Math.min(45, walkMin)}-min walk closes the gap.`
      });
    } else if (stepProgress < 0.4 && hour >= 14 && stepGap > 500) {
      const needed = data.stepsGoal - data.steps;
      const walkMin = Math.round(needed / 100);
      tips.push({
        emoji: "👟",
        title: `${needed.toLocaleString()} steps to your goal`,
        detail: `A ${Math.min(45, walkMin)}-min walk this afternoon gets you there. Movement also boosts mood and energy.`
      });
    } else if (stepProgress < 0.7 && hour >= 19) {
      tips.push({
        emoji: "🌙",
        title: "Quick evening walk?",
        detail: `${(data.stepsGoal - data.steps).toLocaleString()} steps left for the day. Even 15 min helps.`
      });
    } else if (stepProgress >= 1 && hour >= 17) {
      tips.push({
        emoji: "🎯",
        title: "Step goal hit",
        detail: `${data.steps.toLocaleString()} steps logged — well past your ${data.stepsGoal.toLocaleString()} goal.`
      });
    }
  }
  
  // Sleep tips (if user has logged it)
  if (data.sleepHours !== null && data.sleepHours < 6.5) {
    if (hour >= 12 && hour < 16) {
      tips.push({
        emoji: "😴",
        title: "Take a 20-min power nap",
        detail: `Only ${data.sleepHours}h sleep last night. A short nap before 4pm restores focus without messing up tonight's sleep.`
      });
    } else if (hour >= 19) {
      tips.push({
        emoji: "🛏️",
        title: "Wind down early tonight",
        detail: `Your last night was short (${data.sleepHours}h). Aim for bed by ${hour < 22 ? '22:30' : 'soon'} to recover.`
      });
    }
  }
  
  // Hydration
  if (data.water < data.waterGoal * 0.5 && hour >= 14) {
    tips.push({
      emoji: "💧",
      title: `${data.waterGoal - Math.round(data.water)} glasses behind on water`,
      detail: "Mild dehydration is often mistaken for hunger. Drink a glass before your next meal."
    });
  }
  
  // Pre/post-workout nutrition
  if (data.workouts.length > 0 && totalBurned > 200) {
    const lastWorkout = data.workouts[data.workouts.length - 1];
    const workoutHour = parseInt(lastWorkout.time?.split(':')[0] || '0');
    if (Math.abs(hour - workoutHour) < 2 && data.meals.length > 0) {
      const lastMealKcal = data.meals[data.meals.length - 1].kcal;
      if (lastMealKcal < 300) {
        tips.push({
          emoji: "🥩",
          title: "Refuel after that workout",
          detail: "Add 20-30g protein within 2h post-workout to maximize recovery and muscle synthesis."
        });
      }
    }
  }
  
  // Weight progress check (weekly)
  if (data.weightHistory.length >= 2) {
    const lastTwo = data.weightHistory.slice(-2);
    const change = lastTwo[1].weight - lastTwo[0].weight;
    if (data.goalType === "cut" && change > 0.3 && hour < 12) {
      tips.push({
        emoji: "📊",
        title: "Weight up this week",
        detail: "Could be water/sodium fluctuation. Stay consistent — focus on average over 2 weeks, not single weigh-ins."
      });
    } else if (data.goalType === "cut" && change < -1.5) {
      tips.push({
        emoji: "⚠️",
        title: "Losing too fast",
        detail: `${Math.abs(change).toFixed(1)}kg in a week is aggressive — risks muscle loss. Consider a small refeed day.`
      });
    }
  }
  
  // Limit to top 3 most relevant tips
  return tips.slice(0, 3);
};

// ============== TRAINING PROGRESSION ENGINE ==============
// Generates next-session suggestions based on the user's training goal and history.
// 
// Goal definitions:
// - progressive_overload: Double progression. Target rep range 6-10. Hit top → add 2.5kg, reset to bottom.
// - hypertrophy: Higher volume. Target 8-12. Hit top of range → +2kg or +1 rep next session.
// - strength: Heavy/low rep. Target 3-6. Hit top → +2.5-5kg.
// - endurance: Higher reps. Target 12-20. Hit top → +1-2 reps or small weight bump.
// - maintain: No progression suggestions, just confirm consistency.
const TRAINING_GOALS = {
  progressive_overload: {
    label: "Progressive Overload",
    emoji: "📈",
    desc: "Double progression: build reps then add weight",
    repMin: 6,
    repMax: 10,
    weightIncrement: 2.5, // kg
    description: "Hit the top of the range, then add weight and start again from the bottom.",
  },
  hypertrophy: {
    label: "Hypertrophy",
    emoji: "💪",
    desc: "Build muscle size with moderate weight + volume",
    repMin: 8,
    repMax: 12,
    weightIncrement: 2.0,
    description: "Focus on time under tension. Add reps before adding weight.",
  },
  strength: {
    label: "Strength",
    emoji: "🏋️",
    desc: "Heavy weight, lower reps for max force",
    repMin: 3,
    repMax: 6,
    weightIncrement: 5.0,
    description: "Slower progression, larger weight jumps when ready.",
  },
  endurance: {
    label: "Muscular Endurance",
    emoji: "🔁",
    desc: "Higher reps, lighter weights",
    repMin: 12,
    repMax: 20,
    weightIncrement: 1.0,
    description: "Build stamina. Push for more reps before increasing weight.",
  },
  maintain: {
    label: "Maintain",
    emoji: "🎯",
    desc: "Stay consistent, no aggressive progression",
    repMin: 8,
    repMax: 12,
    weightIncrement: 0,
    description: "Match previous performance. Suggestions show last session's targets.",
  },
};

// Generate progression suggestion for a single set
// Returns: { suggestedWeight, suggestedReps, reason, status } or null if maintain mode
const suggestNextSet = (lastSet, exerciseHistory, trainingGoal) => {
  const goal = TRAINING_GOALS[trainingGoal] || TRAINING_GOALS.progressive_overload;
  const { weight, reps } = lastSet;
  if (!weight || !reps) return null; // not a strength set
  
  // Check if user hit top of rep range
  if (reps >= goal.repMax) {
    // Add weight, reset reps to bottom of range
    return {
      suggestedWeight: weight + goal.weightIncrement,
      suggestedReps: goal.repMin,
      reason: `Hit ${reps}+ reps — add weight, drop reps`,
      status: "level_up",
      icon: "⬆️",
    };
  }
  
  // Check if below rep range — suggest stay at this weight, push for more reps
  if (reps < goal.repMin) {
    return {
      suggestedWeight: weight,
      suggestedReps: Math.min(reps + 1, goal.repMin),
      reason: `Below target range — push for ${goal.repMin}+ reps next time`,
      status: "build_reps",
      icon: "↗️",
    };
  }
  
  // In the rep range — push for one more rep at the same weight
  if (reps < goal.repMax) {
    return {
      suggestedWeight: weight,
      suggestedReps: reps + 1,
      reason: `Try +1 rep at ${weight}kg to build toward ${goal.repMax}`,
      status: "build_reps",
      icon: "➕",
    };
  }
  
  return null;
};

// Get the most recent session of an exercise (excluding the workout being analyzed)
const getPreviousExerciseSession = (exerciseName, workoutHistory, currentWorkoutId) => {
  const all = (workoutHistory || []).filter(w => w.id !== currentWorkoutId);
  // Sort newest first
  const sorted = all.sort((a, b) => new Date(b.dateISO || b.date) - new Date(a.dateISO || a.date));
  for (const workout of sorted) {
    if (!workout.exercises) continue;
    const ex = workout.exercises.find(e => e.name.toLowerCase() === exerciseName.toLowerCase());
    if (ex && ex.sets && ex.sets.length > 0) {
      return { workout, exercise: ex };
    }
  }
  return null;
};

// Generate suggestions for an entire workout — returns map keyed by exercise name
// Each entry: { exerciseName, sets: [{setNum, last, suggestion}] }
const generateWorkoutSuggestions = (workout, workoutHistory, trainingGoal) => {
  const suggestions = [];
  if (!workout.exercises) return suggestions;
  
  for (const ex of workout.exercises) {
    if (!ex.sets || ex.sets.length === 0) continue;
    
    // Cardio handling — different progression
    if (ex.type === "stairmaster" || ex.type === "treadmill") {
      const cardioSets = ex.sets.filter(s => s.duration);
      if (cardioSets.length === 0) continue;
      const last = cardioSets[cardioSets.length - 1];
      const prev = getPreviousExerciseSession(ex.name, workoutHistory, workout.id);
      
      let suggestion;
      if (!prev) {
        suggestion = {
          message: "First time tracked — establish baseline",
          status: "baseline",
          icon: "🎯",
        };
      } else {
        const prevTotalDur = (prev.exercise.sets || [])
          .filter(s => s.duration)
          .reduce((sum, s) => sum + s.duration, 0);
        const currentTotalDur = cardioSets.reduce((sum, s) => sum + s.duration, 0);
        
        if (currentTotalDur >= prevTotalDur) {
          // Suggest +5 min or +1 level
          suggestion = {
            suggestedDuration: currentTotalDur + 5,
            suggestedLevel: last.level ? last.level + 0.5 : null,
            message: `Try +5 min OR +0.5 level next time`,
            status: "level_up",
            icon: "⬆️",
          };
        } else {
          suggestion = {
            suggestedDuration: prevTotalDur,
            message: `Match previous: ${prevTotalDur} min`,
            status: "rebuild",
            icon: "↻",
          };
        }
      }
      
      suggestions.push({
        exerciseName: ex.name,
        type: ex.type,
        sets: cardioSets.map((s, i) => ({
          setNum: s.set || i + 1,
          last: s,
          suggestion,
        })),
      });
      continue;
    }
    
    // Strength sets
    const prev = getPreviousExerciseSession(ex.name, workoutHistory, workout.id);
    const setSuggestions = ex.sets
      .filter(s => s.weight && s.reps)
      .map(s => {
        let suggestion;
        if (trainingGoal === "maintain") {
          suggestion = {
            suggestedWeight: s.weight,
            suggestedReps: s.reps,
            reason: "Match this performance",
            status: "maintain",
            icon: "🎯",
          };
        } else {
          suggestion = suggestNextSet(s, workoutHistory, trainingGoal);
        }
        
        // Compare to previous session for this exercise
        let comparedToPrev = null;
        if (prev) {
          const matchingSet = prev.exercise.sets[s.set - 1] || prev.exercise.sets[0];
          if (matchingSet && matchingSet.weight && matchingSet.reps) {
            const volDelta = (s.weight * s.reps) - (matchingSet.weight * matchingSet.reps);
            comparedToPrev = {
              prevWeight: matchingSet.weight,
              prevReps: matchingSet.reps,
              improved: volDelta > 0,
              equal: volDelta === 0,
              regressed: volDelta < 0,
              volDelta,
            };
          }
        }
        
        return {
          setNum: s.set,
          last: s,
          suggestion,
          comparedToPrev,
        };
      });
    
    if (setSuggestions.length > 0) {
      suggestions.push({
        exerciseName: ex.name,
        type: "strength",
        sets: setSuggestions,
        hasPrevious: !!prev,
        previousDate: prev?.workout?.date,
      });
    }
  }
  
  return suggestions;
};

// ============== TRENDS ANALYSIS HELPERS ==============

// Build per-exercise progress data from workout history
// Returns: [{ name, sessions: [{ date, bestSet: {weight, reps}, totalVolume, oneRMEstimate }] }]
const buildExerciseProgress = (workoutHistory, todayWorkouts) => {
  // Combine archived + today's workouts (today not yet archived)
  const today = new Date().toDateString();
  const todayDated = (todayWorkouts || []).map(w => ({ ...w, date: today, dateISO: new Date().toISOString() }));
  const all = [...(workoutHistory || []), ...todayDated];
  
  const byExercise = {};
  
  for (const workout of all) {
    if (!workout.exercises) continue;
    for (const ex of workout.exercises) {
      if (!ex.sets || ex.sets.length === 0) continue;
      const name = ex.name;
      if (!byExercise[name]) byExercise[name] = [];
      
      // Find heaviest weight × reps for this session (ignore cardio sets)
      const weightedSets = ex.sets.filter(s => s.weight && s.reps);
      if (weightedSets.length === 0) {
        // Cardio session — track total duration/level instead
        const cardioSets = ex.sets.filter(s => s.duration);
        if (cardioSets.length > 0) {
          const totalDur = cardioSets.reduce((sum, s) => sum + (s.duration || 0), 0);
          const avgLevel = cardioSets.reduce((sum, s) => sum + (s.level || s.incline || 0), 0) / cardioSets.length;
          byExercise[name].push({
            date: workout.date,
            dateISO: workout.dateISO,
            type: "cardio",
            totalDuration: totalDur,
            avgLevel: Math.round(avgLevel * 10) / 10,
          });
        }
        continue;
      }
      
      // Strength: track best set + total volume
      const bestSet = weightedSets.reduce((best, s) => 
        (s.weight * s.reps > best.weight * best.reps) ? s : best
      , weightedSets[0]);
      const totalVolume = weightedSets.reduce((sum, s) => sum + (s.weight * s.reps), 0);
      // Epley 1RM estimate
      const heaviest = weightedSets.reduce((max, s) => s.weight > max.weight ? s : max, weightedSets[0]);
      const oneRM = Math.round(heaviest.weight * (1 + heaviest.reps / 30));
      
      byExercise[name].push({
        date: workout.date,
        dateISO: workout.dateISO,
        type: "strength",
        bestSet: { weight: bestSet.weight, reps: bestSet.reps },
        heaviestWeight: heaviest.weight,
        totalVolume: Math.round(totalVolume),
        oneRMEstimate: oneRM,
      });
    }
  }
  
  // Sort each exercise's sessions by date and return only those with 2+ sessions
  return Object.entries(byExercise)
    .map(([name, sessions]) => {
      const sorted = sessions.sort((a, b) => new Date(a.dateISO) - new Date(b.dateISO));
      return { name, sessions: sorted };
    })
    .filter(ex => ex.sessions.length >= 1)
    .sort((a, b) => b.sessions.length - a.sessions.length); // most-frequented first
};

// Build sleep history including today's logged sleep if available
const buildSleepData = (sleepHistory, todaySleep) => {
  const today = new Date().toDateString();
  let combined = [...(sleepHistory || [])];
  if (todaySleep !== null && todaySleep !== undefined) {
    combined.push({ date: today, dateISO: new Date().toISOString(), hours: todaySleep });
  }
  return combined.sort((a, b) => new Date(a.dateISO) - new Date(b.dateISO));
};

// ============== HEALTH SCORE ENGINE ==============
// Calculates a 0-100 health score from 5 dimensions:
//   Sleep (25), Training (25), Weight (20), Nutrition (15), Recovery/Energy (15)
// Returns: { total, dimensions: [{name, score, max, status, detail, tip}], topTip }
const calculateHealthScore = (data, sleepData, exerciseProgress) => {
  const today = new Date().toDateString();
  const archived = data.coachingHistory || [];
  // Combine + sort by date so .slice(-N) actually returns the latest N
  const allWorkouts = [...(data.workoutHistory || []), ...(data.workouts || [])]
    .sort((a, b) => {
      const da = new Date(a.dateISO || a.date || 0).getTime();
      const db = new Date(b.dateISO || b.date || 0).getTime();
      return da - db;
    });
  
  // ====== SLEEP DIMENSION (25 points) ======
  let sleepScore = 0;
  let sleepDetail = "Not enough data to score";
  let sleepTip = "Log sleep daily for 7+ nights to get a sleep score";
  let sleepStatus = "no_data";
  
  if (sleepData && sleepData.length >= 3) {
    const recent = sleepData.slice(-7);
    const avg = recent.reduce((s, d) => s + d.hours, 0) / recent.length;
    
    // Average hours score (15 pts max — 8h = full)
    let avgScore = 0;
    if (avg >= 7.5) avgScore = 15;
    else if (avg >= 7) avgScore = 12;
    else if (avg >= 6.5) avgScore = 9;
    else if (avg >= 6) avgScore = 6;
    else if (avg >= 5) avgScore = 3;
    
    // Consistency score (10 pts max — std dev under 0.5h = full)
    const variance = recent.reduce((s, d) => s + Math.pow(d.hours - avg, 2), 0) / recent.length;
    const stdDev = Math.sqrt(variance);
    let consScore = 0;
    if (stdDev <= 0.5) consScore = 10;
    else if (stdDev <= 1) consScore = 7;
    else if (stdDev <= 1.5) consScore = 4;
    else consScore = 2;
    
    sleepScore = avgScore + consScore;
    sleepDetail = `${avg.toFixed(1)}h avg · ±${stdDev.toFixed(1)}h consistency`;
    
    if (avg < 7) {
      sleepTip = `Average ${avg.toFixed(1)}h — try to hit 8h for ${avg < 6.5 ? '+9' : '+6'} pts`;
      sleepStatus = "low";
    } else if (stdDev > 1) {
      sleepTip = `Bedtime varies by ±${stdDev.toFixed(1)}h — go to bed at the same time for +6 pts`;
      sleepStatus = "inconsistent";
    } else {
      sleepTip = avg >= 7.5 ? "Solid sleep schedule — keep it up" : "Push toward 8h average for max points";
      sleepStatus = "good";
    }
  }
  
  // ====== TRAINING DIMENSION (25 points) ======
  let trainingScore = 0;
  let trainingDetail = "Set targets and log workouts";
  let trainingTip = "Set your weekly schedule on Home tab";
  let trainingStatus = "no_data";
  
  // Compute current week's workouts (by day-of-week intersection)
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monday = new Date(now);
  const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  monday.setDate(now.getDate() - daysToMonday);
  monday.setHours(0, 0, 0, 0);
  
  let weekWorkoutsCompleted = 0;
  let weekTargetDays = 0;
  let weekRestDays = 0;
  let weekRestKept = 0;
  
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const dStr = d.toDateString();
    const dayIdx = d.getDay();
    const target = (data.workoutSchedule || {})[dayIdx];
    const isPastOrToday = d <= now;
    
    if (target === 'workout') {
      if (isPastOrToday) weekTargetDays++;
      const did = dStr === today 
        ? data.workouts.some(w => w.name !== "Alltagsaktivität")
        : (data.workoutHistory || []).some(w => w.date === dStr);
      if (did) weekWorkoutsCompleted++;
    } else if (target === 'rest' && isPastOrToday) {
      weekRestDays++;
      const did = dStr === today 
        ? data.workouts.some(w => w.name !== "Alltagsaktivität")
        : (data.workoutHistory || []).some(w => w.date === dStr);
      if (!did) weekRestKept++;
    }
  }
  
  if (weekTargetDays > 0 || weekRestDays > 0) {
    // Workout completion (18 pts max)
    let completionScore = 0;
    if (weekTargetDays > 0) {
      const ratio = weekWorkoutsCompleted / weekTargetDays;
      completionScore = Math.round(ratio * 18);
    } else {
      completionScore = 9; // partial credit if no targets set
    }
    
    // Rest day discipline (7 pts max — sticking to planned rest)
    let restScore = 0;
    if (weekRestDays > 0) {
      const restRatio = weekRestKept / weekRestDays;
      restScore = Math.round(restRatio * 7);
    } else {
      restScore = 4; // partial credit
    }
    
    trainingScore = completionScore + restScore;
    trainingDetail = `${weekWorkoutsCompleted}/${weekTargetDays} planned workouts done`;
    
    if (weekWorkoutsCompleted < weekTargetDays) {
      const missed = weekTargetDays - weekWorkoutsCompleted;
      trainingTip = `${missed} planned session${missed > 1 ? 's' : ''} missed — get back on schedule for +${missed * 4} pts`;
      trainingStatus = "behind";
    } else if (weekTargetDays > 0 && weekWorkoutsCompleted >= weekTargetDays) {
      trainingTip = "All planned workouts done — keep it up";
      trainingStatus = "good";
    } else {
      trainingTip = "Set your weekly training schedule for full points";
      trainingStatus = "no_targets";
    }
  } else if (allWorkouts.length > 0) {
    // No targets set, but workouts logged
    trainingScore = 12;
    trainingDetail = `${allWorkouts.length} total workouts logged`;
    trainingTip = "Set weekly training targets to score this dimension fully";
    trainingStatus = "no_targets";
  }
  
  // ====== WEIGHT DIMENSION (20 points) ======
  let weightScore = 0;
  let weightDetail = "Need 4+ weight entries";
  let weightTip = "Log weight weekly to track progress";
  let weightStatus = "no_data";
  
  const wHist = data.weightHistory || [];
  if (wHist.length >= 2) {
    const oldest = wHist[Math.max(0, wHist.length - 4)].weight;
    const latest = wHist[wHist.length - 1].weight;
    const change = latest - oldest;
    const target = data.targetWeight;
    const direction = data.goalType === "cut" ? -1 : data.goalType === "bulk" ? 1 : 0;
    const distanceToGoal = Math.abs(latest - target);
    
    if (data.goalType === "maintain") {
      // Reward stability
      if (Math.abs(change) <= 0.5) weightScore = 20;
      else if (Math.abs(change) <= 1) weightScore = 15;
      else if (Math.abs(change) <= 2) weightScore = 10;
      else weightScore = 5;
      weightDetail = `${change > 0 ? '+' : ''}${change.toFixed(1)}kg over ${wHist.length} entries`;
      weightStatus = Math.abs(change) <= 1 ? "good" : "drifting";
      weightTip = weightStatus === "good" ? "Weight stable — perfect maintenance" : "Drifting — adjust intake to stabilize";
    } else {
      // Cut or bulk — reward movement in correct direction at sustainable pace
      const rateKgPerWeek = wHist.length >= 2 
        ? (latest - wHist[Math.max(0, wHist.length - 4)].weight) / Math.max(1, (new Date(latest).getTime ? 1 : Math.min(4, wHist.length - 1)))
        : 0;
      
      if (direction === -1) {
        // Cutting — want negative change at 0.3-0.7 kg/week
        if (change <= 0 && Math.abs(change / Math.max(1, wHist.length - 1)) <= 1) {
          weightScore = 20;
          weightStatus = "good";
        } else if (change <= 0) {
          weightScore = 14;
          weightStatus = "fast"; // losing too fast
        } else if (change <= 0.5) {
          weightScore = 10;
          weightStatus = "stalling";
        } else {
          weightScore = 4;
          weightStatus = "wrong_direction";
        }
      } else {
        // Bulking — want positive change at 0.2-0.4 kg/week
        if (change >= 0 && change <= 1.5 * Math.max(1, wHist.length - 1)) {
          weightScore = 20;
          weightStatus = "good";
        } else if (change >= 0) {
          weightScore = 14;
          weightStatus = "fast";
        } else if (change >= -0.5) {
          weightScore = 10;
          weightStatus = "stalling";
        } else {
          weightScore = 4;
          weightStatus = "wrong_direction";
        }
      }
      
      weightDetail = `${change > 0 ? '+' : ''}${change.toFixed(1)}kg · ${distanceToGoal.toFixed(1)}kg to goal`;
      
      if (weightStatus === "good") weightTip = `On track for ${data.goalType} goal`;
      else if (weightStatus === "fast") weightTip = `Changing fast — ease off slightly to preserve muscle`;
      else if (weightStatus === "stalling") weightTip = data.goalType === "cut" ? `Stalling — increase deficit by ~200 kcal/day for +6 pts` : `Stalling — eat ~300 more kcal/day for +6 pts`;
      else weightTip = `Moving wrong direction — review your daily balance in What If`;
    }
  }
  
  // ====== NUTRITION DIMENSION (15 points) ======
  let nutritionScore = 0;
  let nutritionDetail = "Log meals to score";
  let nutritionTip = "Log your meals daily for nutrition score";
  let nutritionStatus = "no_data";
  
  // Score based on logging consistency (last 7 days) + today's macros
  const last7Days = [...archived.slice(-6), { 
    date: today, 
    meals: data.meals || [], 
    totalEaten: (data.meals || []).reduce((s, m) => s + (m.kcal || 0), 0) 
  }];
  
  const daysWithLogging = last7Days.filter(d => d.meals && d.meals.length >= 2).length;
  
  if (daysWithLogging > 0) {
    // Logging consistency (10 pts max)
    const consScore = Math.round((daysWithLogging / 7) * 10);
    
    // Today's calorie target adherence (5 pts max)
    const todayTotalEaten = (data.meals || []).reduce((s, m) => s + (m.kcal || 0), 0);
    let adhScore = 0;
    if (todayTotalEaten > 0) {
      const ratio = todayTotalEaten / data.caloriesGoal;
      if (ratio >= 0.85 && ratio <= 1.05) adhScore = 5;
      else if (ratio >= 0.7 && ratio <= 1.15) adhScore = 3;
      else if (ratio >= 0.5) adhScore = 1;
    } else {
      // Pre-evening grace — only penalize after 8pm if nothing logged
      if (now.getHours() < 20) adhScore = 3;
    }
    
    nutritionScore = consScore + adhScore;
    nutritionDetail = `${daysWithLogging}/7 days logged consistently`;
    
    if (daysWithLogging < 5) {
      nutritionTip = `Only ${daysWithLogging}/7 days logged — log meals daily for +${(7 - daysWithLogging) * 1.4 | 0} pts`;
      nutritionStatus = "inconsistent";
    } else if (todayTotalEaten === 0 && now.getHours() >= 20) {
      nutritionTip = "Nothing logged today — quick log saves your streak";
      nutritionStatus = "missed_today";
    } else {
      nutritionTip = "Solid logging consistency";
      nutritionStatus = "good";
    }
  }
  
  // ====== RECOVERY & ENERGY DIMENSION (15 points) ======
  let recoveryScore = 0;
  let recoveryDetail = "Log workout energy to score";
  let recoveryTip = "Rate your energy 1-5 after each workout";
  let recoveryStatus = "no_data";
  
  // Pull energy levels from recent workouts
  const recentWorkouts = allWorkouts.filter(w => w.energyLevel).slice(-7);
  
  if (recentWorkouts.length >= 2) {
    const avgEnergy = recentWorkouts.reduce((s, w) => s + w.energyLevel, 0) / recentWorkouts.length;
    
    // Energy avg (10 pts max)
    let energyScore = 0;
    if (avgEnergy >= 4) energyScore = 10;
    else if (avgEnergy >= 3.5) energyScore = 8;
    else if (avgEnergy >= 3) energyScore = 6;
    else if (avgEnergy >= 2.5) energyScore = 4;
    else energyScore = 2;
    
    // Rest day adherence (5 pts max — already computed above)
    let restAdh = 0;
    if (weekRestDays > 0) {
      restAdh = Math.round((weekRestKept / weekRestDays) * 5);
    } else {
      restAdh = 3;
    }
    
    recoveryScore = energyScore + restAdh;
    recoveryDetail = `Energy ${avgEnergy.toFixed(1)}/5 · ${weekRestKept}/${weekRestDays || '?'} rest days kept`;
    
    if (avgEnergy < 3) {
      recoveryTip = `Avg energy ${avgEnergy.toFixed(1)}/5 — sleep more, eat enough, take rest days`;
      recoveryStatus = "low";
    } else if (avgEnergy >= 4) {
      recoveryTip = "High energy levels — recovery is dialed in";
      recoveryStatus = "good";
    } else {
      recoveryTip = "Energy is okay — push toward 4+ for max points";
      recoveryStatus = "moderate";
    }
  } else if (allWorkouts.length > 0) {
    // Has workouts but no energy logged
    recoveryScore = 5;
    recoveryDetail = `${allWorkouts.length} workouts logged · 0 with energy ratings`;
    recoveryTip = "Rate your energy 1-5 after each workout for full points";
    recoveryStatus = "no_energy";
  }
  
  const total = sleepScore + trainingScore + weightScore + nutritionScore + recoveryScore;
  
  // Find the dimension with the lowest % score (biggest improvement opportunity)
  const dimensions = [
    { name: "Sleep", score: sleepScore, max: 25, detail: sleepDetail, tip: sleepTip, status: sleepStatus, emoji: "😴" },
    { name: "Training", score: trainingScore, max: 25, detail: trainingDetail, tip: trainingTip, status: trainingStatus, emoji: "💪" },
    { name: "Weight", score: weightScore, max: 20, detail: weightDetail, tip: weightTip, status: weightStatus, emoji: "⚖️" },
    { name: "Nutrition", score: nutritionScore, max: 15, detail: nutritionDetail, tip: nutritionTip, status: nutritionStatus, emoji: "🍽️" },
    { name: "Recovery", score: recoveryScore, max: 15, detail: recoveryDetail, tip: recoveryTip, status: recoveryStatus, emoji: "🔋" },
  ];
  
  // Top tip = lowest scoring dimension that has actionable advice
  const actionable = dimensions
    .filter(d => d.status !== "no_data" && d.status !== "good")
    .sort((a, b) => (a.score / a.max) - (b.score / b.max));
  const topTip = actionable[0] || null;
  
  // Determine score grade
  let grade, gradeColor;
  if (total >= 85) { grade = "Excellent"; gradeColor = "from-emerald-400 to-cyan-400"; }
  else if (total >= 70) { grade = "Good"; gradeColor = "from-cyan-400 to-blue-400"; }
  else if (total >= 55) { grade = "Fair"; gradeColor = "from-yellow-400 to-orange-400"; }
  else if (total >= 40) { grade = "Needs work"; gradeColor = "from-orange-400 to-rose-400"; }
  else { grade = "Just starting"; gradeColor = "from-rose-400 to-pink-400"; }
  
  return { total, dimensions, topTip, grade, gradeColor };
};

// ============== MOMENTUM ENGINE ==============
// Tracks consistency without punishing perfection.
// "Healthy day" = at least 1 meal logged AND (workout-on-target-day OR rest-on-rest-day OR sleep ≥ 6h logged)
// Score: 0-10, based on % of healthy days in last 14
const calculateMomentum = (data) => {
  const today = new Date().toDateString();
  const archived = data.coachingHistory || [];
  const days = [];
  
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dStr = d.toDateString();
    const dayIdx = d.getDay();
    const target = (data.workoutSchedule || {})[dayIdx];
    
    let meals = [], workouts = [], sleepHours = null, steps = 0;
    
    if (dStr === today) {
      meals = data.meals || [];
      workouts = (data.workouts || []).filter(w => w.name !== "Alltagsaktivität");
      sleepHours = data.sleepHours;
      steps = data.steps || 0;
    } else {
      // Pull meals + sleep + steps from coachingHistory (where backdated meal/sleep/step data lives)
      const archDay = archived.find(a => a.date === dStr);
      if (archDay) {
        meals = archDay.meals || [];
        sleepHours = archDay.sleepHours;
        steps = archDay.steps || 0;
      }
      // Pull workouts from workoutHistory (where backdated workouts live)
      const archWorkouts = (data.workoutHistory || []).filter(w => w.date === dStr);
      workouts = archWorkouts;
    }
    
    // Signals of a "consistent" day — any of these counts:
    const trainedOnTargetDay = target === 'workout' && workouts.length > 0;
    const restedOnRestDay = target === 'rest' && workouts.length === 0;
    const trainedAnyDay = workouts.length > 0; // logged a workout (counts even on flex/rest)
    const loggedFood = meals.length >= 2; // at least 2 meals = real logging effort
    const sleptEnough = sleepHours !== null && sleepHours >= 6;
    const movedEnough = steps >= 5000;
    
    // Day is "healthy" if ANY of: training kept (target day), rest kept, food logged, slept enough, or moved enough
    // This is OR logic, not AND — so backdating just one thing still counts
    const isHealthy = trainedOnTargetDay || restedOnRestDay || trainedAnyDay || loggedFood || sleptEnough || movedEnough;
    
    days.push({ 
      date: dStr, 
      isHealthy, 
      hasWorkout: workouts.length > 0,
      hasFood: meals.length > 0,
      hasSleep: sleepHours !== null,
      hasSteps: steps > 0,
      isToday: dStr === today,
    });
  }
  
  // Last 7 days for the headline number
  const last7 = days.slice(-7);
  const healthy7 = last7.filter(d => d.isHealthy).length;
  
  // Last 14 days for trend
  const healthy14 = days.filter(d => d.isHealthy).length;
  
  // Score 0-10: ratio of healthy days
  const score = Math.round((healthy7 / 7) * 10);
  
  let label, color, message;
  if (score >= 9) { label = "On fire"; color = "emerald"; message = "Locked in — 6-7 healthy days this week"; }
  else if (score >= 7) { label = "Building"; color = "cyan"; message = `${healthy7} healthy days this week — momentum building`; }
  else if (score >= 5) { label = "Steady"; color = "yellow"; message = `${healthy7} healthy days · keep showing up`; }
  else if (score >= 3) { label = "Slipping"; color = "orange"; message = `Only ${healthy7} healthy days — get back on track tomorrow`; }
  else { label = "Reset needed"; color = "rose"; message = "Tough stretch. Just log one meal today."; }
  
  return {
    score,
    healthy7,
    healthy14,
    label,
    color,
    message,
    days, // last 14 days for visualization
  };
};

// ============== RECOVERY READINESS ENGINE ==============
// Whoop/Garmin-style green/yellow/red score for whether to train hard today.
// Based on: last night sleep, recent training load, recent energy levels.
const calculateRecoveryReadiness = (data) => {
  let score = 50; // baseline
  let factors = [];
  
  // Last night's sleep (0-30 points contribution to score)
  const sleep = data.sleepHours;
  if (sleep !== null && sleep !== undefined) {
    if (sleep >= 7.5) { score += 25; factors.push({ label: "Great sleep", value: `${sleep}h`, sign: "+" }); }
    else if (sleep >= 7) { score += 15; factors.push({ label: "Good sleep", value: `${sleep}h`, sign: "+" }); }
    else if (sleep >= 6) { score += 5; factors.push({ label: "OK sleep", value: `${sleep}h`, sign: "·" }); }
    else if (sleep >= 5) { score -= 10; factors.push({ label: "Low sleep", value: `${sleep}h`, sign: "−" }); }
    else { score -= 25; factors.push({ label: "Very low sleep", value: `${sleep}h`, sign: "−−" }); }
  } else {
    factors.push({ label: "Sleep not logged", value: "—", sign: "?" });
  }
  
  // Recent training load — look at last 3 days
  const today = new Date().toDateString();
  const recentDays = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    recentDays.push(d.toDateString());
  }
  let recentVolume = 0;
  let recentSessions = 0;
  for (const dStr of recentDays) {
    const items = (dStr === today 
      ? (data.workouts || []) 
      : (data.workoutHistory || []).filter(w => w.date === dStr)
    ).filter(w => w.name !== "Alltagsaktivität");
    for (const w of items) {
      recentVolume += w.totalVolume || 0;
      recentSessions++;
    }
  }
  
  if (recentSessions >= 3) {
    score -= 15;
    factors.push({ label: "Heavy 3-day load", value: `${recentSessions} sessions`, sign: "−" });
  } else if (recentSessions === 2) {
    score -= 5;
    factors.push({ label: "Moderate load", value: "2 sessions", sign: "·" });
  } else if (recentSessions === 0) {
    score += 10;
    factors.push({ label: "Well rested", value: "0 sessions", sign: "+" });
  }
  
  // Recent energy levels (last 3 workouts, by date)
  const allWorkouts = [...(data.workoutHistory || []), ...(data.workouts || [])];
  // Sort by date (newest last) so .slice(-3) really gets the latest
  const sortedWorkouts = allWorkouts.sort((a, b) => {
    const da = new Date(a.dateISO || a.date || 0).getTime();
    const db = new Date(b.dateISO || b.date || 0).getTime();
    return da - db;
  });
  const recentEnergy = sortedWorkouts
    .filter(w => w.energyLevel)
    .slice(-3);
  if (recentEnergy.length > 0) {
    const avgEnergy = recentEnergy.reduce((s, w) => s + w.energyLevel, 0) / recentEnergy.length;
    if (avgEnergy >= 4) { score += 10; factors.push({ label: "High recent energy", value: `${avgEnergy.toFixed(1)}/5`, sign: "+" }); }
    else if (avgEnergy <= 2.5) { score -= 15; factors.push({ label: "Low recent energy", value: `${avgEnergy.toFixed(1)}/5`, sign: "−" }); }
  }
  
  score = Math.max(0, Math.min(100, score));
  
  let status, color, recommendation;
  if (score >= 75) { 
    status = "Train hard"; color = "emerald"; 
    recommendation = "Body's ready — push intensity, hit PRs"; 
  } else if (score >= 55) { 
    status = "Moderate"; color = "yellow"; 
    recommendation = "Train normally, don't max out"; 
  } else if (score >= 35) { 
    status = "Easy day"; color = "orange"; 
    recommendation = "Light session or active recovery"; 
  } else { 
    status = "Rest day"; color = "rose"; 
    recommendation = "Body needs recovery — stretch, walk, sleep"; 
  }
  
  return { score, status, color, recommendation, factors };
};

// ============== WEIGHT FORECAST ENGINE ==============
// Projects weight in 14 days based on current trajectory + today's caloric balance.
// Uses 7700 kcal ≈ 1 kg fat as the conversion rate.
const calculateForecast = (data, balance, tdee) => {
  const wHist = data.weightHistory || [];
  const current = data.bodyWeight;
  const target = data.targetWeight;
  
  // If we have weight history, use the actual rate; otherwise estimate from today's balance
  let kgPerWeek = 0;
  let basis = "estimate";
  
  if (wHist.length >= 3) {
    // Use linear regression on last 4 weeks of data
    const recent = wHist.slice(-Math.min(8, wHist.length));
    const oldestDate = new Date(recent[0].date).getTime();
    const newestDate = new Date(recent[recent.length - 1].date).getTime();
    const daysSpan = (newestDate - oldestDate) / (1000 * 60 * 60 * 24);
    if (daysSpan > 0) {
      const weightChange = recent[recent.length - 1].weight - recent[0].weight;
      kgPerWeek = (weightChange / daysSpan) * 7;
      basis = "history";
    }
  } else {
    // Estimate from today's balance: balance kcal/day → kg/week via 7700 kcal/kg
    kgPerWeek = (balance * 7) / 7700;
    basis = "today";
  }
  
  const projection7 = current + kgPerWeek;
  const projection14 = current + (kgPerWeek * 2);
  const projection28 = current + (kgPerWeek * 4);
  
  // Days to target
  let daysToTarget = null;
  if (kgPerWeek !== 0) {
    const direction = data.goalType === "cut" ? -1 : data.goalType === "bulk" ? 1 : 0;
    const distance = target - current;
    if ((direction === -1 && kgPerWeek < 0) || (direction === 1 && kgPerWeek > 0)) {
      daysToTarget = Math.round(Math.abs(distance / kgPerWeek) * 7);
    }
  }
  
  // Sustainable range check
  const goalLabel = data.goalType;
  let sustainable = "ok";
  let warning = null;
  if (goalLabel === "cut") {
    if (kgPerWeek < -1) { sustainable = "too_aggressive"; warning = "Losing too fast — risk of muscle loss"; }
    else if (kgPerWeek >= 0) { sustainable = "stalled"; warning = "Not in deficit — adjust intake"; }
    else if (kgPerWeek > -0.2) { sustainable = "slow"; warning = "Slow progress — small deficit"; }
  } else if (goalLabel === "bulk") {
    if (kgPerWeek > 0.5) { sustainable = "too_aggressive"; warning = "Gaining too fast — risk of fat gain"; }
    else if (kgPerWeek <= 0) { sustainable = "stalled"; warning = "Not in surplus — adjust intake"; }
  }
  
  return {
    current,
    target,
    kgPerWeek: Math.round(kgPerWeek * 100) / 100,
    projection7: Math.round(projection7 * 10) / 10,
    projection14: Math.round(projection14 * 10) / 10,
    projection28: Math.round(projection28 * 10) / 10,
    daysToTarget,
    sustainable,
    warning,
    basis,
  };
};

      if (data.steps && data.steps > 0) {

          count: data.steps,

        }];

const applyMigrations = (data) => {
  const fromVersion = data.schemaVersion || 1;
  let migrated = { ...data };
  for (let v = fromVersion + 1; v <= SCHEMA_VERSION; v++) {
    if (migrations[v]) {
      try {
        migrated = migrations[v](migrated);
        console.log(`Migrated to schema v${v}`);
      } catch (err) {
        console.error(`Migration v${v} failed:`, err);
      }
    }
  }
  migrated.schemaVersion = SCHEMA_VERSION;
  return migrated;
};

const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...defaultData };
    let parsed = JSON.parse(raw);
    
    // Apply migrations BEFORE any other processing
    parsed = applyMigrations(parsed);
    
    // Daily reset for non-cumulative fields
    if (parsed.lastDate !== new Date().toDateString()) {
      // Compute final step count from stepEntries (or fall back to legacy steps field)
      const finalSteps = (parsed.stepEntries && parsed.stepEntries.length > 0)
        ? Math.max(...parsed.stepEntries.map(e => e.count || 0))
        : (parsed.steps || 0);
      
      // Archive yesterday's snapshot for AI context
      const yesterdaySnapshot = {
        date: parsed.lastDate,
        meals: parsed.meals || [],
        workouts: parsed.workouts || [],
        water: parsed.water || 0,
        steps: finalSteps,
        stepEntries: parsed.stepEntries || [],
        sleepHours: parsed.sleepHours,
        totalEaten: (parsed.meals || []).reduce((s, m) => s + (m.kcal || 0), 0),
        totalBurned: (parsed.workouts || []).reduce((s, w) => s + (w.kcal || 0), 0),
      };
      parsed.coachingHistory = [...(parsed.coachingHistory || []), yesterdaySnapshot].slice(-14);
      
      // Archive workouts into long-term history (180 days) with date attached
      if (parsed.workouts && parsed.workouts.length > 0) {
        const datedWorkouts = parsed.workouts.filter(w => w.name !== "Alltagsaktivität").map(w => ({
          ...w, 
          date: parsed.lastDate, 
          dateISO: new Date(parsed.lastDate).toISOString()
        }));
        parsed.workoutHistory = [...(parsed.workoutHistory || []), ...datedWorkouts].slice(-500);
      }
      
      // Archive sleep into long-term history (90 days)
      if (parsed.sleepHours !== null && parsed.sleepHours !== undefined) {
        const sleepEntry = {
          date: parsed.lastDate,
          dateISO: new Date(parsed.lastDate).toISOString(),
          hours: parsed.sleepHours,
        };
        parsed.sleepHistory = [...(parsed.sleepHistory || []), sleepEntry].slice(-90);
      }
      
      parsed.meals = [];
      parsed.workouts = [];
      parsed.water = 0;
      parsed.steps = 0;
      parsed.stepEntries = []; // reset stepEntries each day
      parsed.sleepHours = null; // resets daily — must log fresh each morning
      parsed.lastDate = new Date().toDateString();
    }
    // Keep data.steps in sync with stepEntries (latest reading wins)
    if (parsed.stepEntries && parsed.stepEntries.length > 0) {
      parsed.steps = stepsFromEntries(parsed.stepEntries);
    }
    // Use deep merge for new fields, but preserve user data
    return { ...defaultData, ...parsed };
  } catch (err) {
    console.error("Load error:", err);
    return { ...defaultData };
  }
};

  if (data.sleepHours != null) f.push(`sleep=${data.sleepHours}`);

const influxQueryRows = async (flux) => {
  const res = await fetch("/influx/api/v2/query?org=home", {
    method: "POST",
    headers: {
      "Authorization": "Token " + INFLUX_TOKEN,
      "Content-Type": "application/vnd.flux",
      "Accept": "application/csv",
    },
    body: flux,
  });
  if (!res.ok) throw new Error("influx query failed");
  const lines = (await res.text()).split("\n").filter(l => l && !l.startsWith("#"));
  if (lines.length < 2) return [];
  const headers = lines[0].split(",");
  const vi = headers.indexOf("_value");
  const ti = headers.indexOf("_time");
  const fi = headers.indexOf("_field");
  return lines.slice(1).map(l => {
    const c = l.split(",");
    return { time: c[ti], value: parseFloat(c[vi]), field: fi >= 0 ? c[fi] : null };
  }).filter(r => r.time && !isNaN(r.value));
};

    q(`from(bucket:"homeassistant") |> range(start: -3d) |> filter(fn:(r)=> r._measurement=="garmin_sleep") |> last()`),

        time: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
        count: v, dateISO: new Date().toISOString(), auto: true,
      }];
      data.stepEntries = newEntries;
      data.steps = stepsFromEntries(newEntries);
      changed = true;
    }
  }
  const yesterdayStr = (() => { const d = new Date(); d.setDate(d.getDate() - 1); return d.toDateString(); })();
  const sleepVal = slD[today] != null ? slD[today] : slD[yesterdayStr];
  if (sleepVal != null) {
    const v = Math.round(sleepVal * 10) / 10;
    if (data.sleepHours !== v) { data.sleepHours = v; changed = true; }
  }
  const hrKeys = Object.keys(hrD).sort((a, b) => new Date(a) - new Date(b));
  const hrVal = hrD[today] != null ? hrD[today] : (hrKeys.length ? hrD[hrKeys[hrKeys.length - 1]] : null);
  if (hrVal != null) {
    const v = Math.round(hrVal);
    if (data.restingHR !== v) { data.restingHR = v; changed = true; }
  }
  // Schlafphasen (letzte erfasste Nacht, Garmin)
  const phases = {};
  for (const r of slPhasesR) { if (r.field) phases[r.field] = Math.round(r.value * 10) / 10; }
  if (phases.total_h != null && JSON.stringify(data.sleepPhases || {}) !== JSON.stringify(phases)) {
    data.sleepPhases = phases;
    changed = true;
  }
  if (enD[today] != null) {

    let auto = (data.workouts || []).find(w => w.auto === true);
    if (auto) {

    } else if (kcal > 0) {
      data.workouts = [...(data.workouts || []), {
        id: Date.now(), name: "Alltagsaktivität", auto: true, kcal,
        duration: Math.round(exD[today] || 0), time: "auto", icon: "🚶", exercises: [],

  // --- LETZTE 14 TAGE ins Tagesarchiv (Momentum / Health Score) ---
  const hist = [...(data.coachingHistory || [])];
  for (let i = 1; i <= 14; i++) {

    const ds = d.toDateString();
    if (stepsD[ds] == null && slD[ds] == null && exD[ds] == null) continue;
    let entry = hist.find(h => h.date === ds);
    if (!entry) {
      entry = { date: ds, meals: [], workouts: [], water: 0, steps: 0, sleepHours: null, totalEaten: 0, totalBurned: 0 };
      hist.push(entry);
      changed = true;
    }
    if (stepsD[ds] != null && Math.round(stepsD[ds]) !== (entry.steps || 0)) {
      entry.steps = Math.round(stepsD[ds]); changed = true;
    }
    if (slD[ds] != null && entry.sleepHours == null) {
      entry.sleepHours = Math.round(slD[ds] * 10) / 10; changed = true;
    }
    // Trainingstag = 30+ Min Apple-Trainingszeit
    if ((exD[ds] || 0) >= 30 && !(data.workoutHistory || []).some(w => w.date === ds)) {
      const noon = new Date(d); noon.setHours(12, 0, 0, 0);
      data.workoutHistory = [...(data.workoutHistory || []), {
        id: noon.getTime(), name: "Training (Health)", auto: true, date: ds, dateISO: noon.toISOString(),
        kcal: Math.round((enD[ds] || 0) / 4.184), duration: Math.round(exD[ds]), icon: "💪", exercises: [],
      }].slice(-500);
      changed = true;
    }
  }
  data.coachingHistory = hist.slice(-30);

  // Schlaf-Historie für Trends
  for (const [ds, hours] of Object.entries(slD)) {
    if (ds !== today && !(data.sleepHistory || []).some(s => s.date === ds)) {
      data.sleepHistory = [...(data.sleepHistory || []), {
        date: ds, dateISO: new Date(ds).toISOString(), hours: Math.round(hours * 10) / 10,
      }].sort((a, b) => new Date(a.dateISO) - new Date(b.dateISO)).slice(-90);
      changed = true;
    }
  }

  if (changed) saveData(data);
};

// Photos are stored separately in IndexedDB because they're too large for localStorage.
// Each photo: { id, dateISO, blob, weight, notes, thumbnail }
const DB_NAME = "fitsync_photos";
const DB_VERSION = 1;
const STORE = "progress_photos";

let _dbPromise = null;
const openDB = () => {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onupgradeneeded = (ev) => {
      const db = ev.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: "id" });
        store.createIndex("dateISO", "dateISO", { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
  });
  return _dbPromise;
};

// Resize image file → blob to keep storage under control
const resizeImage = (file, maxW = 800, maxH = 1200, quality = 0.85) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        // Maintain aspect ratio, fit within max bounds
        const ratio = Math.min(maxW / width, maxH / height, 1);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
        
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        canvas.toBlob((blob) => {
          if (blob) resolve({ blob, width, height });
          else reject(new Error("Canvas conversion failed"));
        }, 'image/jpeg', quality);
      };
      img.onerror = () => reject(new Error("Image load failed"));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error("File read failed"));
    reader.readAsDataURL(file);
  });
};

// Create a small thumbnail for fast list rendering
const createThumbnail = async (file) => {
  const result = await resizeImage(file, 200, 300, 0.7);
  return result.blob;
};

// Public photo API
const photoStore = {
  async add(file, metadata = {}) {
    const db = await openDB();
    const [resized, thumb] = await Promise.all([
      resizeImage(file, 800, 1200, 0.85),
      createThumbnail(file),
    ]);
    
    // Use custom date if provided, otherwise now. Custom date stored as local-noon to avoid TZ shifts.
    let dateObj = new Date();
    if (metadata.dateISO) {
      const customD = new Date(metadata.dateISO);
      customD.setHours(12, 0, 0, 0);
      dateObj = customD;
    }
    
    const photo = {
      id: `photo_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
      dateISO: dateObj.toISOString(),
      date: dateObj.toDateString(),
      blob: resized.blob,
      thumbnail: thumb,
      width: resized.width,
      height: resized.height,
      weight: metadata.weight || null,
      notes: metadata.notes || "",
      angle: metadata.angle || "front", // front, side, back
    };
    
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).add(photo);
      tx.oncomplete = () => resolve(photo);
      tx.onerror = () => reject(tx.error);
    });
  },
  
  async list() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => {
        // Sort newest first
        resolve((req.result || []).sort((a, b) => new Date(b.dateISO) - new Date(a.dateISO)));
      };
      req.onerror = () => reject(req.error);
    });
  },
  
  async delete(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  
  async update(id, patch) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      const store = tx.objectStore(STORE);
      const getReq = store.get(id);
      getReq.onsuccess = () => {
        const photo = getReq.result;
        if (!photo) { reject(new Error("Photo not found")); return; }
        Object.assign(photo, patch);
        store.put(photo);
      };
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  
  async getStorageEstimate() {
    if (navigator.storage && navigator.storage.estimate) {
      const est = await navigator.storage.estimate();
      return {
        usedMB: Math.round((est.usage || 0) / 1024 / 1024 * 10) / 10,
        quotaMB: Math.round((est.quota || 0) / 1024 / 1024),
      };
    }
    return null;
  },
};

// ============== STRONG OCR PARSER ==============
// Parses raw OCR text from a Strong screenshot into structured workout data.
// Rules:
// 1. Exercise names are headers (capitalized lines, often ending in machine/cable/dumbbell)
// 2. Sets follow format: "N WEIGHTkg × REPS" with optional 1RM number after
// 3. Treadmill 1st entry = StairMaster (level × duration), 2nd+ = real treadmill
// 4. Dedup by exact exercise name + same set values
const parseStrongOCR = (rawText) => {
  const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  
  const exercises = [];
  let currentExercise = null;
  let workoutMeta = { name: null, duration: 60, totalVolume: 0, prCount: 0 };
  let treadmillCount = 0;
  
  // Try to find workout name (often "Pull", "Push", "Legs", "Upper", "Lower" near top)
  // Scan more lines since OCR may have artifacts at top
  const namePattern = /^(Pull|Push|Legs?|Upper|Lower|Full[\s-]?Body|Chest|Back|Arms?|Shoulders?|Cardio|Glutes?)$/i;
  for (const line of lines.slice(0, 15)) {
    if (namePattern.test(line.trim())) {
      // Normalize the name
      const normalized = line.trim().toLowerCase();
      if (normalized.startsWith('pull')) workoutMeta.name = 'Pull';
      else if (normalized.startsWith('push')) workoutMeta.name = 'Push';
      else if (normalized.startsWith('leg')) workoutMeta.name = 'Legs';
      else if (normalized.includes('upper')) workoutMeta.name = 'Upper';
      else if (normalized.includes('lower')) workoutMeta.name = 'Lower';
      else if (normalized.includes('full')) workoutMeta.name = 'Full Body';
      else if (normalized.includes('chest')) workoutMeta.name = 'Chest';
      else if (normalized.includes('back')) workoutMeta.name = 'Back';
      else if (normalized.includes('arm')) workoutMeta.name = 'Arms';
      else if (normalized.includes('shoulder')) workoutMeta.name = 'Shoulders';
      else if (normalized.includes('cardio')) workoutMeta.name = 'Cardio';
      else if (normalized.includes('glute')) workoutMeta.name = 'Glutes';
      else workoutMeta.name = line.trim();
      break;
    }
  }
  
  // Try to find duration like "2h 55m" or "1h 30m" or "45m"
  for (const line of lines) {
    const dm = line.match(/(\d+)h\s*(\d+)m/);
    const mm = line.match(/^(\d+)m$/);
    if (dm) {
      workoutMeta.duration = parseInt(dm[1]) * 60 + parseInt(dm[2]);
      break;
    } else if (mm && parseInt(mm[1]) < 240) {
      workoutMeta.duration = parseInt(mm[1]);
      break;
    }
  }
  
  // Find total volume "14884 kg"
  const volMatch = rawText.match(/(\d{3,6})\s*kg(?!\s*[×x])/);
  if (volMatch) workoutMeta.totalVolume = parseInt(volMatch[1]);
  
  // Find PRs "9 PRs"
  const prMatch = rawText.match(/(\d+)\s*PRs?/i);
  if (prMatch) workoutMeta.prCount = parseInt(prMatch[1]);
  
  // Common Strong exercise keywords for header detection
  const exerciseKeywords = /\b(row|press|curl|pulldown|fly|extension|raise|squat|deadlift|lunge|push.?up|pull.?up|crunch|machine|dumbbell|barbell|cable|gorilla|treadmill|running|cycling|elliptical|stairmaster|stair.?master|seated|standing|bench|incline|decline|hammer|preacher|tricep|bicep|lateral|frontal|reverse|hip|leg|calf|glute|chest|back|shoulder|abs|core|iso.?lateral)\b/i;
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    
    // Skip metadata lines
    if (/^(Pull|Push|Legs|Upper|Lower|Cardio|^\d+:\d+|Saturday|Sunday|Monday|Tuesday|Wednesday|Thursday|Friday|^\d+\s*(PRs?|kg|h|m)|1RM|VOL\.?|WEIGHT|Pace|Personal Records|^×$|^x$)/i.test(line)) continue;
    
    // Try to detect a set line: "1 72 kg × 7" or "1 72kg x 7"
    const setMatch = line.match(/^(\d+)\s+([\d.]+)\s*kg\s*[×x]\s*(\d+)/i);
    
    // Treadmill/cardio entry: "1 9 km | 30:00" or "1 5 km | 25:30"
    const cardioMatch = line.match(/^(\d+)\s+([\d.]+)\s*km\s*\|\s*(\d+):(\d+)/i);
    
    if (cardioMatch && currentExercise && /treadmill|running/i.test(currentExercise.name)) {
      const setNum = parseInt(cardioMatch[1]);
      const num1 = parseFloat(cardioMatch[2]);
      const minutes = parseInt(cardioMatch[3]);
      const seconds = parseInt(cardioMatch[4]);
      const totalMin = minutes + (seconds / 60);
      
      treadmillCount++;
      if (treadmillCount === 1) {
        // First treadmill entry is StairMaster
        // Convert: rename, store level + duration
        if (currentExercise.name.toLowerCase().includes("treadmill") || currentExercise.name.toLowerCase().includes("running")) {
          currentExercise.name = "StairMaster";
          currentExercise.type = "stairmaster";
        }
        currentExercise.sets.push({
          set: setNum,
          level: num1, // first num = speed/level
          duration: totalMin, // second num = time
          display: `Level ${num1} · ${minutes}:${String(seconds).padStart(2,'0')}`,
        });
      } else {
        // Real treadmill — first num = incline level, second = time
        if (currentExercise.type === "stairmaster") {
          // Create a new exercise for actual treadmill
          if (currentExercise.sets.length > 0) exercises.push(currentExercise);
          currentExercise = { name: "Treadmill (Run)", type: "treadmill", sets: [] };
        }
        currentExercise.sets.push({
          set: setNum,
          incline: num1,
          duration: totalMin,
          display: `Incline ${num1} · ${minutes}:${String(seconds).padStart(2,'0')}`,
        });
      }
      continue;
    }
    
    if (setMatch && currentExercise) {
      const setNum = parseInt(setMatch[1]);
      const weight = parseFloat(setMatch[2]);
      const reps = parseInt(setMatch[3]);
      
      // Check for duplicate set (same set num + weight + reps in current exercise)
      const isDup = currentExercise.sets.some(s => 
        s.set === setNum && s.weight === weight && s.reps === reps
      );
      if (!isDup) {
        currentExercise.sets.push({ set: setNum, weight, reps });
      }
      continue;
    }
    
    // Header detection: contains exercise keyword and is mostly text
    if (exerciseKeywords.test(line) && line.length > 3 && line.length < 60) {
      // Strip trailing "1RM" or "Pace" etc.
      const cleanName = line.replace(/\s*(1RM|Pace|VOL\.?|WEIGHT)\s*$/i, '').trim();
      
      // Skip if this looks like a label only
      if (/^(1RM|Pace|VOL|WEIGHT)$/i.test(cleanName)) continue;
      
      // Check if exercise already exists (cross-screenshot dedup) — match by name
      const existing = exercises.find(ex => ex.name.toLowerCase() === cleanName.toLowerCase());
      if (existing) {
        currentExercise = existing;
      } else {
        if (currentExercise && currentExercise.sets.length > 0) {
          exercises.push(currentExercise);
        }
        currentExercise = { 
          name: cleanName, 
          type: /treadmill|running/i.test(cleanName) ? "treadmill" : "strength",
          sets: [] 
        };
      }
    }
  }
  
  // Push final exercise
  if (currentExercise && currentExercise.sets.length > 0) {
    exercises.push(currentExercise);
  }
  
  // Fallback: infer workout name from exercise composition
  if (!workoutMeta.name) {
    const allText = exercises.map(ex => ex.name.toLowerCase()).join(' ');
    const pullKeywords = ['row', 'pulldown', 'pull.?up', 'curl', 'lat ', 'bicep', 'rear delt', 'face pull', 'shrug', 'reverse fly', 'gorilla'];
    const pushKeywords = ['bench', 'press', 'push.?up', 'fly ', 'tricep', 'dip', 'shoulder press', 'chest', 'overhead'];
    const legKeywords = ['squat', 'deadlift', 'lunge', 'leg ', 'calf', 'hamstring', 'quad', 'glute', 'hip thrust', 'romanian'];
    const cardioKeywords = ['running', 'treadmill', 'cycling', 'rowing', 'elliptical', 'stairmaster'];
    
    let pullScore = 0, pushScore = 0, legScore = 0, cardioScore = 0;
    pullKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) pullScore++; });
    pushKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) pushScore++; });
    legKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) legScore++; });
    cardioKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) cardioScore++; });
    
    const max = Math.max(pullScore, pushScore, legScore, cardioScore);
    if (max === 0) workoutMeta.name = "Workout";
    else if (pullScore === max) workoutMeta.name = "Pull";
    else if (pushScore === max) workoutMeta.name = "Push";
    else if (legScore === max) workoutMeta.name = "Legs";
    else workoutMeta.name = "Cardio";
  }
  
  // Calculate kcal estimate using MET formula
  // Strength: ~5.5 MET, Cardio higher
  const bodyWeight = 75; // will be replaced by actual weight at call time
  const totalMin = workoutMeta.duration;
  const baseKcal = Math.round(5.5 * bodyWeight * (totalMin / 60));
  
  return {
    name: workoutMeta.name,
    duration: workoutMeta.duration,
    totalVolume: workoutMeta.totalVolume,
    prCount: workoutMeta.prCount,
    estimatedKcal: baseKcal,
    exercises,
  };
};

// ============== MERGE TWO PARSED WORKOUTS (for multiple screenshots) ==============
const mergeWorkouts = (existing, newOne) => {
  if (!existing) return newOne;
  const merged = { ...existing };
  for (const newEx of newOne.exercises) {
    const existingEx = merged.exercises.find(ex => 
      ex.name.toLowerCase() === newEx.name.toLowerCase()
    );
    if (existingEx) {
      // Merge sets, dedup
      for (const s of newEx.sets) {
        const dup = existingEx.sets.some(es => 
          es.set === s.set && 
          ((es.weight === s.weight && es.reps === s.reps) || 
           (es.duration === s.duration && es.level === s.level))
        );
        if (!dup) existingEx.sets.push(s);
      }
      // Sort by set number
      existingEx.sets.sort((a, b) => a.set - b.set);
    } else {
      merged.exercises.push(newEx);
    }
  }
  return merged;
};

// Wraps a panel with edit-mode reorder controls (up/down/hide).
// On long-press, edit mode activates and shows up/down arrows on each panel.
const PanelWrapper = ({ id, label, editMode, isFirst, isLast, onMoveUp, onMoveDown, onHide, onLongPress, children }) => {
  const pressTimerRef = uR(null);
  const startedRef = uR(false);
  
  const startPress = () => {
    if (editMode) return; // already in edit mode
    startedRef.current = true;
    pressTimerRef.current = setTimeout(() => {
      if (startedRef.current && navigator.vibrate) navigator.vibrate(50);
      if (startedRef.current) onLongPress();
    }, 600);
  };
  
  const cancelPress = () => {
    startedRef.current = false;
    if (pressTimerRef.current) {
      clearTimeout(pressTimerRef.current);
      pressTimerRef.current = null;
    }
  };
  
  if (!editMode) {
    return e('div', { 
      className: "relative",
      onTouchStart: startPress,
      onTouchEnd: cancelPress,
      onTouchCancel: cancelPress,
      onTouchMove: cancelPress,
      onMouseDown: startPress,
      onMouseUp: cancelPress,
      onMouseLeave: cancelPress,
    }, children);
  }
  
  // Edit mode: show controls overlay
  return e('div', { className: "relative mb-4" },
    // The panel itself, with edit-mode visual treatment
    e('div', { className: "ring-2 ring-emerald-400/50 rounded-3xl overflow-visible relative" }, 
      // Panel content (kept interactive for visibility but click-protected)
      e('div', { 
        className: "pointer-events-none opacity-90",
        style: { marginBottom: 0 }
      }, children),
      // Top-right control: hide
      e('button', {
        onClick: (ev) => { ev.stopPropagation(); onHide(); },
        className: "absolute top-2 right-2 w-8 h-8 rounded-full bg-rose-500/30 border border-rose-400 flex items-center justify-center active:scale-90 z-10"
      }, e('span', { className: "text-rose-200 text-base font-bold leading-none" }, "×")),
      // Bottom-right: label
      e('div', {
        className: "absolute bottom-2 right-2 bg-emerald-500/90 text-black text-[9px] font-mono-d uppercase px-2 py-0.5 rounded font-bold pointer-events-none"
      }, label),
    ),
    // Move up/down buttons
    e('div', { className: "flex gap-2 mt-2 justify-center" },
      e('button', {
        onClick: onMoveUp,
        disabled: isFirst,
        className: `flex-1 max-w-[140px] rounded-xl py-2.5 text-xs font-display font-semibold flex items-center justify-center gap-1 ${isFirst ? 'bg-zinc-900 text-zinc-700' : 'bg-zinc-800 text-emerald-400 active:scale-95'}`
      }, "↑ Move up"),
      e('button', {
        onClick: onMoveDown,
        disabled: isLast,
        className: `flex-1 max-w-[140px] rounded-xl py-2.5 text-xs font-display font-semibold flex items-center justify-center gap-1 ${isLast ? 'bg-zinc-900 text-zinc-700' : 'bg-zinc-800 text-emerald-400 active:scale-95'}`
      }, "Move down ↓")
    )
  );
};

  const tdee = calculateTDEE(data); // baseline burn (BMR × activity, excluding planned exercise)
  const totalOut = tdee + totalBurned; // total calories burned today

  const goalRange = getGoalRange(data.goalType, tdee);
  // 0% to 100% mapping: where does balance fall in the healthy range?
  const isOnTrack = balance >= goalRange.min && balance <= goalRange.max;
  const isTooAggressive = data.goalType === "cut" ? balance < goalRange.min : balance > goalRange.max;

    if (idx > 0) {
      [order[idx - 1], order[idx]] = [order[idx], order[idx - 1]];
      updateData({ panelOrder: order });
    }
  };
  const movePanelDown = (id) => {
    const order = [...(data.panelOrder || [])];
    const idx = order.indexOf(id);
    if (idx >= 0 && idx < order.length - 1) {
      [order[idx], order[idx + 1]] = [order[idx + 1], order[idx]];
      updateData({ panelOrder: order });
    }
  };
  const hidePanel = (id) => {
    updateData({ panelOrder: (data.panelOrder || []).filter(p => p !== id) });
  };
  const showPanel = (id) => {
    if (!(data.panelOrder || []).includes(id)) {
      updateData({ panelOrder: [...(data.panelOrder || []), id] });

  };
  const resetPanelOrder = () => {
    updateData({ panelOrder: [
      "mission", "momentum", "recovery", "weight_goal", "health_score",
      "protein", "energy_balance", "schedule", "ai_coaching", "smart_tips",
      "forecast", "stats_grid", "body_weight", "todays_training",
    ]});
  };
  
  // ============ BACKDATING HELPERS for daily metrics ============
  // Updates a single field (steps/water/sleepHours/restingHR) for a specific past date.
  // If forDate is null, updates today's data normally.
  const setMetricForDate = (field, value, forDate) => {
    if (!forDate) {
      // Today
      updateData({ [field]: value });
      return;
    }
    const targetDateStr = fromLocalISO(forDate).toDateString();
    const history = [...(data.coachingHistory || [])];
    let dayEntry = history.find(d => d.date === targetDateStr);
    if (!dayEntry) {
      dayEntry = { 
        date: targetDateStr, meals: [], workouts: [],
        water: 0, steps: 0, sleepHours: null,
        totalEaten: 0, totalBurned: 0,
      };
      history.push(dayEntry);
    }
    dayEntry[field] = value;
    
    // For sleep, also append to sleepHistory so trends pick it up
    if (field === 'sleepHours') {
      const sleepHist = [...(data.sleepHistory || [])].filter(s => s.date !== targetDateStr);
      sleepHist.push({
        date: targetDateStr,
        dateISO: fromLocalISO(forDate).toISOString(),
        hours: value,
      });
      sleepHist.sort((a, b) => new Date(a.dateISO) - new Date(b.dateISO));

    } else {
      updateData({ coachingHistory: history.slice(-30) });
    }
  };
  
  // Get a metric value for a specific past date (for showing existing values when backdating)
  const getMetricForDate = (field, forDate) => {
    if (!forDate) return data[field];
    const targetDateStr = fromLocalISO(forDate).toDateString();
    const dayEntry = (data.coachingHistory || []).find(d => d.date === targetDateStr);

  // ============ HANDLERS ============

    if (!files || files.length === 0) return;
    setImporting(true);

    try {
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const baseProgress = (i / files.length) * 100;
        
        const result = await Tesseract.recognize(file, 'eng', {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              setImportProgress(baseProgress + (m.progress * 100 / files.length));
            }
          }
        });
        
        const parsed = parseStrongOCR(result.data.text);
        // Recalculate kcal with actual body weight
        parsed.estimatedKcal = Math.round(5.5 * data.bodyWeight * (parsed.duration / 60));

    const today = new Date().toDateString();
    let dateForWorkout = today;
    let isBackdated = false;
    
    if (targetDate) {
      // targetDate is a "YYYY-MM-DD" local-date string. Parse as LOCAL time.
      const d = fromLocalISO(targetDate);
      dateForWorkout = d.toDateString();

      (() => {
        const wHist = data.weightHistory || [];
        const allWorkouts = [...(data.workoutHistory || []), ...data.workouts];
        
        // Need 4+ weeks of weight data and 8+ workouts to detect recomp
        if (wHist.length < 4) {
          return e('div', { className: "bg-zinc-900/80 rounded-3xl p-5 mb-4 border border-white/5" },

        }
        
        // Calculate weight trend over last 4 weeks (slope)
        const recent = wHist.slice(-4);
        const oldestW = recent[0].weight;
        const newestW = recent[recent.length - 1].weight;
        const weightChange = newestW - oldestW;
        const weeksDiff = (new Date(recent[recent.length - 1].date) - new Date(recent[0].date)) / (1000 * 60 * 60 * 24 * 7);
        const weightChangePerWeek = weeksDiff > 0 ? weightChange / weeksDiff : 0;
        
        // Calculate strength trend — compare recent 1RMs to earlier ones for top exercises
        const exerciseProgress = buildExerciseProgress(data.workoutHistory, data.workouts);
        const exercisesWith2Plus = exerciseProgress.filter(ex => 
          ex.sessions.filter(s => s.type === 'strength').length >= 2
        );
        
        if (exercisesWith2Plus.length < 3) {
          return e('div', { className: "bg-zinc-900/80 rounded-3xl p-5 mb-4 border border-white/5" },
            e('div', { className: "flex items-center gap-2 mb-2" },

            ),
            e('p', { className: "text-zinc-400 text-sm leading-snug" }, 
              "Log the same exercises across multiple workouts so we can detect strength changes."
            )
          );
        }
        
        // Average 1RM change across top 5 strength exercises
        const topExercises = exercisesWith2Plus.slice(0, 5);
        let totalRMChange = 0, exCount = 0;
        for (const ex of topExercises) {
          const strengthSessions = ex.sessions.filter(s => s.type === 'strength');
          if (strengthSessions.length >= 2) {
            const first = strengthSessions[0].oneRMEstimate;
            const last = strengthSessions[strengthSessions.length - 1].oneRMEstimate;
            totalRMChange += ((last - first) / first) * 100; // percent change
            exCount++;
          }
        }
        const avgStrengthChangePct = exCount > 0 ? totalRMChange / exCount : 0;
        
        // Determine status
        let status, color, emoji, message;
        const isWeightStable = Math.abs(weightChangePerWeek) < 0.2;
        const isWeightDown = weightChangePerWeek <= -0.2;
        const isWeightUp = weightChangePerWeek >= 0.2;
        const strongUp = avgStrengthChangePct > 3;
        const strongStable = Math.abs(avgStrengthChangePct) <= 3;
        const strongDown = avgStrengthChangePct < -3;
        
        if (isWeightStable && strongUp) {
          status = "Recomping 🎯";
          color = "from-emerald-500/20 to-cyan-500/10 border-emerald-500/30";
          emoji = "💪";
          message = "Weight stable, strength up — you're building muscle while losing fat. Best-case scenario.";

          status = "Cutting + getting stronger";

          message = "Lost weight AND gained strength — rare and elite. Whatever you're doing, keep doing.";

          color = "from-cyan-500/20 to-blue-500/10 border-cyan-500/30";

          message = "Losing weight while maintaining strength — preserving muscle. Sustainable cut.";

          status = "Losing too aggressive";
          color = "from-orange-500/20 to-rose-500/10 border-orange-500/30";

          message = "Weight + strength both down — likely losing muscle. Increase protein, reduce deficit slightly.";

          emoji = "📈";
          message = "Gaining weight + getting stronger — good lean bulk progress.";
        } else if (isWeightUp && strongStable) {
          status = "Slow bulk";
          color = "from-yellow-500/20 to-orange-500/10 border-yellow-500/30";

          message = "Gaining weight without strength gains — could be more fat than muscle. Push training intensity.";

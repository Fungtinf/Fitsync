// Estimate kcal for an ingredient
const estimateIngredientKcal = (name, amount, unit) => {
  if (!name || !amount) return 0;
  const key = name.toLowerCase().trim();
  
  // Try exact match, then partial match
  let food = FOOD_DB[key];
  if (!food) {
    // Try to find a partial match
    const matches = Object.keys(FOOD_DB).filter(k => 
      key.includes(k) || k.includes(key)
    ).sort((a, b) => b.length - a.length); // longest match wins
    if (matches.length > 0) food = FOOD_DB[matches[0]];
  }
  if (!food) return null; // unknown food
  
  const amt = parseFloat(amount);
  if (isNaN(amt)) return 0;
  
  // Convert amount to base unit (food.unit is per 100g/100ml/1 piece)
  if (food.unit === "piece") {
    return Math.round(food.kcal * amt);
  }
  
  // Handle unit conversion
  let amtInBaseUnit = amt;
  if (unit === "kg") amtInBaseUnit = amt * 1000;
  else if (unit === "l") amtInBaseUnit = amt * 1000;
  else if (unit === "tbsp") amtInBaseUnit = amt * 15; // ~15g/ml
  else if (unit === "tsp") amtInBaseUnit = amt * 5;
  else if (unit === "cup") amtInBaseUnit = amt * 240;
  else if (unit === "oz") amtInBaseUnit = amt * 28;
  // g, ml stay as-is
  
  return Math.round((food.kcal * amtInBaseUnit) / 100);
};

// ============== BMR / TDEE CALCULATIONS ==============
// Mifflin-St Jeor formula — most accurate for general population
const calculateBMR = (data) => {
  const { bodyWeight: w, height: h, age, sex } = data;
  if (sex === "male") {
    return Math.round(10 * w + 6.25 * h - 5 * age + 5);
  } else {
    return Math.round(10 * w + 6.25 * h - 5 * age - 161);
  }
};

// TDEE = BMR × activity multiplier (excluding planned exercise — that's added separately)
const calculateTDEE = (data) => {
  return Math.round(calculateBMR(data) * data.activityLevel);
};

// Healthy deficit/surplus ranges per goal
const getGoalRange = (goalType, tdee) => {
  if (goalType === "cut") return { min: -750, max: -300, label: "deficit", target: -500 };
  if (goalType === "bulk") return { min: 200, max: 500, label: "surplus", target: 350 };
  return { min: -100, max: 100, label: "balance", target: 0 };
};

// ============== SMART TIPS ENGINE ==============
// Generates personalized suggestions based on the day's data
const generateSmartTips = (data, balance, tdee, isOnTrack, isTooAggressive, totalBurned) => {
  const tips = [];
  const hour = new Date().getHours();
  const goalRange = getGoalRange(data.goalType, tdee);
  const stepProgress = data.steps / data.stepsGoal;
  
  // Energy balance tips
  if (data.goalType === "cut") {
    if (balance > 100 && hour >= 14) {
      // Eating too much for cutting goal
      const surplus = balance - goalRange.target;
      const walkMinutes = Math.round(surplus / 5); // ~5 kcal/min walking
      tips.push({
        emoji: "🚶",
        title: `Take a ${Math.min(60, Math.max(15, walkMinutes))}-min walk`,
        detail: `You're ${balance > 0 ? 'in surplus' : 'short of deficit'}. A walk burns ~${Math.min(300, walkMinutes * 5)} kcal and helps hit your cut goal.`
      });
    } else if (isTooAggressive && hour >= 17) {
      // Deficit too aggressive — need to eat more
      const needed = goalRange.min - balance;
      tips.push({
        emoji: "🥜",
        title: `Eat ${Math.abs(needed)} more kcal`,
        detail: "Your deficit is too aggressive — risks muscle loss and slowed metabolism. Add a protein snack like nuts, yogurt, or a shake."
      });
    } else if (isOnTrack && hour >= 18) {
      tips.push({
        emoji: "🎯",
        title: "Perfect deficit today",
        detail: `${Math.abs(balance)} kcal deficit — sustainable for steady fat loss without losing muscle.`
      });
    }
  } else if (data.goalType === "bulk") {
    if (balance < goalRange.min && hour >= 14) {
      const needed = goalRange.target - balance;
      tips.push({
        emoji: "🍚",
        title: `Add ${needed} kcal to grow`,
        detail: "Not enough surplus for muscle gain. Add carbs + protein — rice + chicken, oats + peanut butter, or a calorie shake."
      });
    }
  }
  
  // Step count tips
  if (stepProgress < 0.4 && hour >= 14 && hour < 21) {
    const needed = data.stepsGoal - data.steps;
    const walkMin = Math.round(needed / 100); // ~100 steps/min
    tips.push({
      emoji: "👟",
      title: `${needed.toLocaleString()} steps to your goal`,
      detail: `A ${Math.min(45, walkMin)}-min walk this afternoon gets you there. Movement also boosts mood and energy.`
    });
  } else if (stepProgress < 0.7 && hour >= 19) {
    tips.push({
      emoji: "🌙",
      title: "Quick evening walk?",
      detail: `${(data.stepsGoal - data.steps).toLocaleString()} steps left for the day. Even 15 min helps.`
    });
  }
  
  // Sleep tips (if user has logged it)
  if (data.sleepHours !== null && data.sleepHours < 6.5) {
    if (hour >= 12 && hour < 16) {
      tips.push({
        emoji: "😴",
        title: "Take a 20-min power nap",
        detail: `Only ${data.sleepHours}h sleep last night. A short nap before 4pm restores focus without messing up tonight's sleep.`
      });
    } else if (hour >= 19) {
      tips.push({
        emoji: "🛏️",
        title: "Wind down early tonight",
        detail: `Your last night was short (${data.sleepHours}h). Aim for bed by ${hour < 22 ? '22:30' : 'soon'} to recover.`
      });
    }
  }
  
  // Hydration
  if (data.water < data.waterGoal * 0.5 && hour >= 14) {
    tips.push({
      emoji: "💧",
      title: `${data.waterGoal - Math.round(data.water)} glasses behind on water`,
      detail: "Mild dehydration is often mistaken for hunger. Drink a glass before your next meal."
    });
  }
  
  // Pre/post-workout nutrition
  if (data.workouts.length > 0 && totalBurned > 200) {
    const lastWorkout = data.workouts[data.workouts.length - 1];
    const workoutHour = parseInt(lastWorkout.time?.split(':')[0] || '0');
    if (Math.abs(hour - workoutHour) < 2 && data.meals.length > 0) {
      const lastMealKcal = data.meals[data.meals.length - 1].kcal;
      if (lastMealKcal < 300) {
        tips.push({
          emoji: "🥩",
          title: "Refuel after that workout",
          detail: "Add 20-30g protein within 2h post-workout to maximize recovery and muscle synthesis."
        });
      }
    }
  }
  
  // Weight progress check (weekly)
  if (data.weightHistory.length >= 2) {
    const lastTwo = data.weightHistory.slice(-2);
    const change = lastTwo[1].weight - lastTwo[0].weight;
    if (data.goalType === "cut" && change > 0.3 && hour < 12) {
      tips.push({
        emoji: "📊",
        title: "Weight up this week",
        detail: "Could be water/sodium fluctuation. Stay consistent — focus on average over 2 weeks, not single weigh-ins."
      });
    } else if (data.goalType === "cut" && change < -1.5) {
      tips.push({
        emoji: "⚠️",
        title: "Losing too fast",
        detail: `${Math.abs(change).toFixed(1)}kg in a week is aggressive — risks muscle loss. Consider a small refeed day.`
      });
    }
  }
  
  // Limit to top 3 most relevant tips
  return tips.slice(0, 3);
};

// ============== AI COACHING (Claude API) ==============
// Builds a comprehensive prompt with all user data and asks Claude for personalized advice.
const generateAICoaching = async (data, apiKey) => {
  if (!apiKey || !apiKey.startsWith("sk-ant-")) {
    throw new Error("Please add your Anthropic API key in Settings first. Get one free at console.anthropic.com");
  }
  
  const tdee = calculateTDEE(data);
  const bmr = calculateBMR(data);
  const todayEaten = data.meals.reduce((s, m) => s + (m.kcal || 0), 0);
  const todayBurned = data.workouts.reduce((s, w) => s + (w.kcal || 0), 0);
  const todayBalance = todayEaten - tdee - todayBurned;
  
  // Build last 7 days summary
  const recentDays = (data.coachingHistory || []).slice(-7).map(d => ({
    date: d.date,
    eaten: d.totalEaten,
    burned: d.totalBurned,
    balance: d.totalEaten - tdee - d.totalBurned,
    workouts: d.workouts.map(w => ({ name: w.name, duration: w.duration, kcal: w.kcal })),
    sleepHours: d.sleepHours,
    steps: d.steps,
  }));
  
  // Weight trend
  const weightTrend = data.weightHistory.slice(-4).map(w => ({
    date: new Date(w.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
    weight: w.weight
  }));
  
  // Today's workouts in detail
  const todayWorkouts = data.workouts.map(w => ({
    name: w.name,
    duration: w.duration,
    kcal: w.kcal,
    exercises: (w.exercises || []).map(ex => ({
      name: ex.name,
      sets: ex.sets.map(s => 
        s.weight !== undefined ? `${s.weight}kg×${s.reps}` :
        s.level !== undefined ? `Lvl${s.level} ${s.duration}min` :
        s.incline !== undefined ? `Incl${s.incline} ${s.duration}min` : ""
      )
    }))
  }));
  
  const userContext = {
    profile: {
      sex: data.sex,
      age: data.age,
      height_cm: data.height,
      currentWeight_kg: data.bodyWeight,
      targetWeight_kg: data.targetWeight,
      goalType: data.goalType,
      activityLevel: data.activityLevel,
      bmr: bmr,
      tdee: tdee,
      caloriesGoal: data.caloriesGoal,
    },
    today: {
      date: new Date().toDateString(),
      eaten_kcal: todayEaten,
      workout_burned_kcal: todayBurned,
      tdee_baseline_kcal: tdee,
      energy_balance: todayBalance,
      meals: data.meals.map(m => ({ name: m.name, kcal: m.kcal, time: m.time, ingredients: m.ingredients || [] })),
      workouts: todayWorkouts,
      steps: data.steps,
      stepsGoal: data.stepsGoal,
      water_glasses: Math.round(data.water),
      waterGoal_glasses: data.waterGoal,
      sleepHours_lastNight: data.sleepHours,
      restingHR: data.restingHR,
    },
    last7Days: recentDays,
    weightTrend: weightTrend,
  };
  
  const systemPrompt = `You are an expert fitness and nutrition coach giving personalized daily advice.

Your job: analyze the user's data and produce a JSON response with concrete, specific tips for tomorrow.

Style rules:
- Be direct, actionable, and specific. Give numbers, durations, exact suggestions.
- Use the user's actual data (workouts, meals, weight trend) to back up advice.
- Don't be generic. "Eat more protein" is bad. "Add 30g protein at breakfast — try eggs or Greek yogurt" is good.
- If they did StairMaster, suggest specific level/duration adjustments.
- If they're cutting and balance was wrong today, calculate the gap and suggest specific fixes.
- Be honest if they're doing well — don't manufacture problems.
- Tomorrow tips should be planned for tomorrow specifically (e.g. "tomorrow's training: focus on legs since you've done 2 pulls this week").

Output ONLY valid JSON in this exact schema, nothing else:
{
  "summary": "1-2 sentence overall assessment of today",
  "today_review": [
    {"category": "nutrition" | "training" | "recovery" | "hydration", "title": "short title", "detail": "specific advice with numbers"}
  ],
  "tomorrow_plan": [
    {"category": "nutrition" | "training" | "recovery" | "hydration", "title": "short title", "detail": "specific advice with numbers"}
  ],
  "weekly_insight": "1-2 sentences spotting a pattern across the week"
}`;

  const userMessage = `Here is my fitness data:\n\n${JSON.stringify(userContext, null, 2)}\n\nGive me a coaching review of today and a specific plan for tomorrow.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: "user", content: userMessage }],
      })
    });
    
    if (!response.ok) {
      const err = await response.text();
      throw new Error(`API error ${response.status}: ${err.substring(0, 200)}`);
    }
    
    const result = await response.json();
    const text = result.content[0].text;
    
    // Strip markdown code fences if present
    const cleanText = text.replace(/^```(?:json)?\n?/i, '').replace(/\n?```$/i, '').trim();
    const parsed = JSON.parse(cleanText);
    
    return {
      ...parsed,
      generatedAt: new Date().toISOString(),
      date: new Date().toDateString(),
    };
  } catch (err) {
    if (err.message.includes("JSON")) {
      throw new Error("Couldn't parse AI response. Try again.");
    }
    throw err;
  }
};

const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...defaultData };
    const parsed = JSON.parse(raw);
    
    // Daily reset for non-cumulative fields
    if (parsed.lastDate !== new Date().toDateString()) {
      // Archive yesterday's snapshot for AI context
      const yesterdaySnapshot = {
        date: parsed.lastDate,
        meals: parsed.meals || [],
        workouts: parsed.workouts || [],
        water: parsed.water || 0,
        steps: parsed.steps || 0,
        sleepHours: parsed.sleepHours,
        totalEaten: (parsed.meals || []).reduce((s, m) => s + (m.kcal || 0), 0),
        totalBurned: (parsed.workouts || []).reduce((s, w) => s + (w.kcal || 0), 0),
      };
      parsed.coachingHistory = [...(parsed.coachingHistory || []), yesterdaySnapshot].slice(-14);
      
      parsed.meals = [];
      parsed.workouts = [];
      parsed.water = 0;
      parsed.steps = 0;
      parsed.sleepHours = null; // resets daily — must log fresh each morning
      parsed.lastDate = new Date().toDateString();
    }
    return { ...defaultData, ...parsed };
  } catch (err) {
    console.error("Load error:", err);
    return { ...defaultData };
  }
};

const saveData = (data) => {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (err) {
    console.error("Save error:", err);
  }
};

// ============== STRONG OCR PARSER ==============
// Parses raw OCR text from a Strong screenshot into structured workout data.
// Rules:
// 1. Exercise names are headers (capitalized lines, often ending in machine/cable/dumbbell)
// 2. Sets follow format: "N WEIGHTkg × REPS" with optional 1RM number after
// 3. Treadmill 1st entry = StairMaster (level × duration), 2nd+ = real treadmill
// 4. Dedup by exact exercise name + same set values
const parseStrongOCR = (rawText) => {
  const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  
  const exercises = [];
  let currentExercise = null;
  let workoutMeta = { name: null, duration: 60, totalVolume: 0, prCount: 0 };
  let treadmillCount = 0;
  
  // Try to find workout name (often "Pull", "Push", "Legs", "Upper", "Lower" near top)
  // Scan more lines since OCR may have artifacts at top
  const namePattern = /^(Pull|Push|Legs?|Upper|Lower|Full[\s-]?Body|Chest|Back|Arms?|Shoulders?|Cardio|Glutes?)$/i;
  for (const line of lines.slice(0, 15)) {
    if (namePattern.test(line.trim())) {
      // Normalize the name
      const normalized = line.trim().toLowerCase();
      if (normalized.startsWith('pull')) workoutMeta.name = 'Pull';
      else if (normalized.startsWith('push')) workoutMeta.name = 'Push';
      else if (normalized.startsWith('leg')) workoutMeta.name = 'Legs';
      else if (normalized.includes('upper')) workoutMeta.name = 'Upper';
      else if (normalized.includes('lower')) workoutMeta.name = 'Lower';
      else if (normalized.includes('full')) workoutMeta.name = 'Full Body';
      else if (normalized.includes('chest')) workoutMeta.name = 'Chest';
      else if (normalized.includes('back')) workoutMeta.name = 'Back';
      else if (normalized.includes('arm')) workoutMeta.name = 'Arms';
      else if (normalized.includes('shoulder')) workoutMeta.name = 'Shoulders';
      else if (normalized.includes('cardio')) workoutMeta.name = 'Cardio';
      else if (normalized.includes('glute')) workoutMeta.name = 'Glutes';
      else workoutMeta.name = line.trim();
      break;
    }
  }
  
  // Try to find duration like "2h 55m" or "1h 30m" or "45m"
  for (const line of lines) {
    const dm = line.match(/(\d+)h\s*(\d+)m/);
    const mm = line.match(/^(\d+)m$/);
    if (dm) {
      workoutMeta.duration = parseInt(dm[1]) * 60 + parseInt(dm[2]);
      break;
    } else if (mm && parseInt(mm[1]) < 240) {
      workoutMeta.duration = parseInt(mm[1]);
      break;
    }
  }
  
  // Find total volume "14884 kg"
  const volMatch = rawText.match(/(\d{3,6})\s*kg(?!\s*[×x])/);
  if (volMatch) workoutMeta.totalVolume = parseInt(volMatch[1]);
  
  // Find PRs "9 PRs"
  const prMatch = rawText.match(/(\d+)\s*PRs?/i);
  if (prMatch) workoutMeta.prCount = parseInt(prMatch[1]);
  
  // Common Strong exercise keywords for header detection
  const exerciseKeywords = /\b(row|press|curl|pulldown|fly|extension|raise|squat|deadlift|lunge|push.?up|pull.?up|crunch|machine|dumbbell|barbell|cable|gorilla|treadmill|running|cycling|elliptical|stairmaster|stair.?master|seated|standing|bench|incline|decline|hammer|preacher|tricep|bicep|lateral|frontal|reverse|hip|leg|calf|glute|chest|back|shoulder|abs|core|iso.?lateral)\b/i;
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    
    // Skip metadata lines
    if (/^(Pull|Push|Legs|Upper|Lower|Cardio|^\d+:\d+|Saturday|Sunday|Monday|Tuesday|Wednesday|Thursday|Friday|^\d+\s*(PRs?|kg|h|m)|1RM|VOL\.?|WEIGHT|Pace|Personal Records|^×$|^x$)/i.test(line)) continue;
    
    // Try to detect a set line: "1 72 kg × 7" or "1 72kg x 7"
    const setMatch = line.match(/^(\d+)\s+([\d.]+)\s*kg\s*[×x]\s*(\d+)/i);
    
    // Treadmill/cardio entry: "1 9 km | 30:00" or "1 5 km | 25:30"
    const cardioMatch = line.match(/^(\d+)\s+([\d.]+)\s*km\s*\|\s*(\d+):(\d+)/i);
    
    if (cardioMatch && currentExercise && /treadmill|running/i.test(currentExercise.name)) {
      const setNum = parseInt(cardioMatch[1]);
      const num1 = parseFloat(cardioMatch[2]);
      const minutes = parseInt(cardioMatch[3]);
      const seconds = parseInt(cardioMatch[4]);
      const totalMin = minutes + (seconds / 60);
      
      treadmillCount++;
      if (treadmillCount === 1) {
        // First treadmill entry is StairMaster
        // Convert: rename, store level + duration
        if (currentExercise.name.toLowerCase().includes("treadmill") || currentExercise.name.toLowerCase().includes("running")) {
          currentExercise.name = "StairMaster";
          currentExercise.type = "stairmaster";
        }
        currentExercise.sets.push({
          set: setNum,
          level: num1, // first num = speed/level
          duration: totalMin, // second num = time
          display: `Level ${num1} · ${minutes}:${String(seconds).padStart(2,'0')}`,
        });
      } else {
        // Real treadmill — first num = incline level, second = time
        if (currentExercise.type === "stairmaster") {
          // Create a new exercise for actual treadmill
          if (currentExercise.sets.length > 0) exercises.push(currentExercise);
          currentExercise = { name: "Treadmill (Run)", type: "treadmill", sets: [] };
        }
        currentExercise.sets.push({
          set: setNum,
          incline: num1,
          duration: totalMin,
          display: `Incline ${num1} · ${minutes}:${String(seconds).padStart(2,'0')}`,
        });
      }
      continue;
    }
    
    if (setMatch && currentExercise) {
      const setNum = parseInt(setMatch[1]);
      const weight = parseFloat(setMatch[2]);
      const reps = parseInt(setMatch[3]);
      
      // Check for duplicate set (same set num + weight + reps in current exercise)
      const isDup = currentExercise.sets.some(s => 
        s.set === setNum && s.weight === weight && s.reps === reps
      );
      if (!isDup) {
        currentExercise.sets.push({ set: setNum, weight, reps });
      }
      continue;
    }
    
    // Header detection: contains exercise keyword and is mostly text
    if (exerciseKeywords.test(line) && line.length > 3 && line.length < 60) {
      // Strip trailing "1RM" or "Pace" etc.
      const cleanName = line.replace(/\s*(1RM|Pace|VOL\.?|WEIGHT)\s*$/i, '').trim();
      
      // Skip if this looks like a label only
      if (/^(1RM|Pace|VOL|WEIGHT)$/i.test(cleanName)) continue;
      
      // Check if exercise already exists (cross-screenshot dedup) — match by name
      const existing = exercises.find(ex => ex.name.toLowerCase() === cleanName.toLowerCase());
      if (existing) {
        currentExercise = existing;
      } else {
        if (currentExercise && currentExercise.sets.length > 0) {
          exercises.push(currentExercise);
        }
        currentExercise = { 
          name: cleanName, 
          type: /treadmill|running/i.test(cleanName) ? "treadmill" : "strength",
          sets: [] 
        };
      }
    }
  }
  
  // Push final exercise
  if (currentExercise && currentExercise.sets.length > 0) {
    exercises.push(currentExercise);
  }
  
  // Fallback: infer workout name from exercise composition
  if (!workoutMeta.name) {
    const allText = exercises.map(ex => ex.name.toLowerCase()).join(' ');
    const pullKeywords = ['row', 'pulldown', 'pull.?up', 'curl', 'lat ', 'bicep', 'rear delt', 'face pull', 'shrug', 'reverse fly', 'gorilla'];
    const pushKeywords = ['bench', 'press', 'push.?up', 'fly ', 'tricep', 'dip', 'shoulder press', 'chest', 'overhead'];
    const legKeywords = ['squat', 'deadlift', 'lunge', 'leg ', 'calf', 'hamstring', 'quad', 'glute', 'hip thrust', 'romanian'];
    const cardioKeywords = ['running', 'treadmill', 'cycling', 'rowing', 'elliptical', 'stairmaster'];
    
    let pullScore = 0, pushScore = 0, legScore = 0, cardioScore = 0;
    pullKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) pullScore++; });
    pushKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) pushScore++; });
    legKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) legScore++; });
    cardioKeywords.forEach(k => { if (new RegExp(k, 'i').test(allText)) cardioScore++; });
    
    const max = Math.max(pullScore, pushScore, legScore, cardioScore);
    if (max === 0) workoutMeta.name = "Workout";
    else if (pullScore === max) workoutMeta.name = "Pull";
    else if (pushScore === max) workoutMeta.name = "Push";
    else if (legScore === max) workoutMeta.name = "Legs";
    else workoutMeta.name = "Cardio";
  }
  
  // Calculate kcal estimate using MET formula
  // Strength: ~5.5 MET, Cardio higher
  const bodyWeight = 75; // will be replaced by actual weight at call time
  const totalMin = workoutMeta.duration;
  const baseKcal = Math.round(5.5 * bodyWeight * (totalMin / 60));
  
  return {
    name: workoutMeta.name,
    duration: workoutMeta.duration,
    totalVolume: workoutMeta.totalVolume,
    prCount: workoutMeta.prCount,
    estimatedKcal: baseKcal,
    exercises,
  };
};

// ============== MERGE TWO PARSED WORKOUTS (for multiple screenshots) ==============
const mergeWorkouts = (existing, newOne) => {
  if (!existing) return newOne;
  const merged = { ...existing };
  for (const newEx of newOne.exercises) {
    const existingEx = merged.exercises.find(ex => 
      ex.name.toLowerCase() === newEx.name.toLowerCase()
    );
    if (existingEx) {
      // Merge sets, dedup
      for (const s of newEx.sets) {
        const dup = existingEx.sets.some(es => 
          es.set === s.set && 
          ((es.weight === s.weight && es.reps === s.reps) || 
           (es.duration === s.duration && es.level === s.level))
        );
        if (!dup) existingEx.sets.push(s);
      }
      // Sort by set number
      existingEx.sets.sort((a, b) => a.set - b.set);
    } else {
      merged.exercises.push(newEx);
    }
  }
  return merged;
};

// ============== MAIN APP ==============
const App = () => {
  const [data, setData] = uS(loadData);
  const [activeTab, setActiveTab] = uS("home");
  
  // Modals
  const [modal, setModal] = uS(null);
  const [editingMeal, setEditingMeal] = uS(null);
  const [editingWorkout, setEditingWorkout] = uS(null);
  const [importing, setImporting] = uS(false);
  const [importProgress, setImportProgress] = uS(0);
  const [importResult, setImportResult] = uS(null);
  const [swipedMealId, setSwipedMealId] = uS(null);
  
  // AI coaching state
  const [coachingLoading, setCoachingLoading] = uS(false);
  const [coachingError, setCoachingError] = uS(null);
  
  const fileInputRef = uR(null);
  const touchStartX = uR(0);
  
  // Persist on every change
  uE(() => { saveData(data); }, [data]);
  
  // Auto-run coaching once per day on first open if API key is set
  uE(() => {
    if (!data.anthropicApiKey || !data.anthropicApiKey.startsWith("sk-ant-")) return;
    if (coachingLoading) return;
    
    const today = new Date().toDateString();
    const lastCoachingDate = data.coaching?.date;
    
    if (lastCoachingDate !== today) {
      // Auto-run coaching on app open if we don't have today's yet
      // (Only run if there's some data to work with)
      const hasData = data.meals.length > 0 || data.workouts.length > 0 || (data.coachingHistory && data.coachingHistory.length > 0);
      if (hasData) {
        runCoaching();
      }
    }
  }, [data.anthropicApiKey]); // re-run when key is added
  
  const runCoaching = async () => {
    if (coachingLoading) return;
    setCoachingLoading(true);
    setCoachingError(null);
    try {
      const result = await generateAICoaching(data, data.anthropicApiKey);
      setData(prev => ({ ...prev, coaching: result }));
    } catch (err) {
      setCoachingError(err.message || "Failed to generate coaching");
    } finally {
      setCoachingLoading(false);
    }
  };

  const totalEaten = data.meals.reduce((s, m) => s + m.kcal, 0);
  const totalBurned = data.workouts.reduce((s, w) => s + (w.kcal || 0), 0);
  // Burned calories are shown as info but don't add to budget
  const caloriesLeft = data.caloriesGoal - totalEaten;
  const calProgress = (totalEaten / data.caloriesGoal) * 100;
  const stepProgress = (data.steps / data.stepsGoal) * 100;
  const weightToGoal = (data.bodyWeight - data.targetWeight).toFixed(1);
  const weightLost = data.weightHistory.length > 0 
    ? (data.weightHistory[0].weight - data.bodyWeight).toFixed(1) 
    : "0.0";

  // Energy balance — true deficit/surplus calculation
  const tdee = calculateTDEE(data); // baseline burn (BMR × activity, excluding planned exercise)
  const totalOut = tdee + totalBurned; // total calories burned today
  const balance = totalEaten - totalOut; // negative = deficit, positive = surplus
  const goalRange = getGoalRange(data.goalType, tdee);
  // 0% to 100% mapping: where does balance fall in the healthy range?
  const isOnTrack = balance >= goalRange.min && balance <= goalRange.max;
  const isTooAggressive = data.goalType === "cut" ? balance < goalRange.min : balance > goalRange.max;

  const updateData = (patch) => setData(prev => ({ ...prev, ...patch }));

  // ============ HANDLERS ============
  const handleScreenshotImport = async (files) => {
    if (!files || files.length === 0) return;
    setImporting(true);
    setImportProgress(0);
    
    let mergedResult = null;
    
    try {
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const baseProgress = (i / files.length) * 100;
        
        const result = await Tesseract.recognize(file, 'eng', {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              setImportProgress(baseProgress + (m.progress * 100 / files.length));
            }
          }
        });
        
        const parsed = parseStrongOCR(result.data.text);
        // Recalculate kcal with actual body weight
        parsed.estimatedKcal = Math.round(5.5 * data.bodyWeight * (parsed.duration / 60));
        mergedResult = mergeWorkouts(mergedResult, parsed);
      }
      
      setImporting(false);
      setImportResult(mergedResult);
    } catch (err) {
      console.error("OCR error:", err);
      alert("Couldn't read the screenshot. Try a clearer image or log manually.");
      setImporting(false);
    }
  };

  const confirmImport = () => {
    const newWorkout = {
      id: Date.now(),
      name: importResult.name,
      duration: importResult.duration,
      kcal: importResult.estimatedKcal,
      time: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
      icon: "🏋️",
      fromStrong: true,
      exercises: importResult.exercises,
      totalVolume: importResult.totalVolume,
      prCount: importResult.prCount,
    };
    updateData({ workouts: [...data.workouts, newWorkout] });
    setImportResult(null);
  };

  const deleteMeal = (id) => {
    updateData({ meals: data.meals.filter(m => m.id !== id) });
    setSwipedMealId(null);
  };

  const deleteWorkout = (id) => {
    updateData({ workouts: data.workouts.filter(w => w.id !== id) });
  };

  const addWater = (ml) => {
    const glasses = ml / 250;
    updateData({ water: Math.min(data.water + glasses, 30) });
    setModal(null);
  };

  // ============ RENDER ============
  return e('div', { className: "min-h-screen bg-black pb-20 pt-safe" },
    
    // Status header for non-PWA mode (subtle install hint)
    !window.matchMedia('(display-mode: standalone)').matches && e('div', { 
      className: "bg-emerald-500/10 border-b border-emerald-500/20 px-4 py-2 text-center text-xs text-emerald-300 font-mono-d"
    }, "Tap Share → Add to Home Screen for the full app experience"),
    
    // ============ HOME TAB ============
    activeTab === "home" && e('div', { className: "px-5 pt-4" },
      
      // Header
      e('div', { className: "flex justify-between items-start mb-6" },
        e('div', null,
          e('p', { className: "text-zinc-500 text-sm font-mono-d uppercase tracking-wider" }, 
            new Date().toLocaleDateString('en-US', { weekday: 'long' })
          ),
          e('h1', { className: "text-white text-3xl font-display font-bold leading-tight" }, 
            "Today",
            e('span', { className: "text-emerald-400" }, ".")
          )
        ),
        e('div', { className: "w-11 h-11 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-white font-bold shadow-lg shadow-emerald-500/30" }, "F")
      ),

      // Weight goal banner
      e('button', { 
        onClick: () => setModal('weight'),

const ApiKeyModal = ({ data, onClose, onSave }) => {
  const [key, setKey] = uS(data.anthropicApiKey || "");
  const [showKey, setShowKey] = uS(false);
  const [testing, setTesting] = uS(false);
  const [testResult, setTestResult] = uS(null);
  
  const isValidFormat = key.startsWith("sk-ant-") && key.length > 20;
  
  const testKey = async () => {
    setTesting(true);
    setTestResult(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": key,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 10,
          messages: [{ role: "user", content: "Say OK" }]
        })
      });
      if (res.ok) {
        setTestResult({ ok: true, msg: "Key works! Connected to Anthropic." });
      } else {
        const err = await res.text();
        setTestResult({ ok: false, msg: `Failed: ${err.substring(0, 100)}` });
      }
    } catch (err) {
      setTestResult({ ok: false, msg: err.message });
    } finally {
      setTesting(false);
    }
  };
  
  return e(Modal, { onClose, title: "AI Coach setup" },
    e('p', { className: "text-zinc-500 text-sm mb-5" }, 
      "Paste your Anthropic API key to enable daily AI coaching. Your key is stored only on this device, never sent anywhere except directly to Anthropic."

    // How to get a key
    e('div', { className: "bg-zinc-800 rounded-2xl p-4 mb-4" },
      e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase mb-2" }, "How to get a key"),
      e('ol', { className: "text-zinc-300 text-xs space-y-1.5 ml-4 list-decimal" },
        e('li', null, "Go to ", e('span', { className: "text-emerald-400 font-mono-d" }, "console.anthropic.com")),
        e('li', null, "Sign up (free $5 credit included)"),
        e('li', null, "Settings → API Keys → Create Key"),
        e('li', null, "Copy and paste it below")
      )
    ),
    
    e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase mb-2" }, "API key"),
    e('div', { className: "relative mb-3" },
      e('input', {
        value: key,
        onChange: (ev) => { setKey(ev.target.value.trim()); setTestResult(null); },
        type: showKey ? "text" : "password",
        placeholder: "sk-ant-...",
        autoCapitalize: "off",
        autoCorrect: "off",
        spellCheck: false,
        className: "w-full bg-zinc-800 text-white text-sm font-mono-d rounded-xl px-4 py-3 pr-20 outline-none focus:ring-2 focus:ring-emerald-400"
      }),
      e('button', { 
        onClick: () => setShowKey(!showKey),
        className: "absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 text-xs font-mono-d uppercase"
      }, showKey ? "hide" : "show")
    ),
    
    // Format check
    key && !isValidFormat && e('p', { className: "text-orange-400 text-xs mb-3" }, 
      "Should start with 'sk-ant-'"
    ),
    
    // Test button
    isValidFormat && e('button', { 
      onClick: testKey,
      disabled: testing,
      className: `w-full rounded-xl py-2.5 text-xs font-display font-semibold mb-3 ${testing ? 'bg-zinc-800 text-zinc-500' : 'bg-zinc-800 text-emerald-400 active:scale-95'}`
    }, testing ? "Testing..." : "Test connection"),
    
    // Test result
    testResult && e('div', { className: `rounded-xl p-3 mb-3 ${testResult.ok ? 'bg-emerald-500/10 border border-emerald-500/30' : 'bg-rose-500/10 border border-rose-500/30'}` },

    e('p', { className: "text-[10px] text-zinc-600 leading-snug mb-4" },

const EditWorkoutModal = ({ workout, bodyWeight, onClose, onSave, onDelete }) => {
  const [w, setW] = uS(JSON.parse(JSON.stringify(workout)));
  const [kcalEdited, setKcalEdited] = uS(false);
  
  // Recompute total volume
  const recalcVolume = (workout) => {
    let total = 0;
    for (const ex of workout.exercises) {
      for (const s of ex.sets) {
        if (s.weight && s.reps) total += s.weight * s.reps;
      }
    }
    return Math.round(total);
  };
  
  // Recompute kcal from MET formula
  const recalcKcal = (duration) => {
    return Math.round(5.5 * (bodyWeight || 75) * (duration / 60));
  };
  
  const updateSet = (exIdx, setIdx, field, value) => {
    const updated = { ...w };
    updated.exercises[exIdx].sets[setIdx][field] = value === "" ? "" : parseFloat(value);
    updated.totalVolume = recalcVolume(updated);
    setW(updated);
  };
  
  const removeSet = (exIdx, setIdx) => {
    const updated = { ...w };
    updated.exercises[exIdx].sets.splice(setIdx, 1);
    updated.totalVolume = recalcVolume(updated);
    setW(updated);
  };
  
  const removeExercise = (exIdx) => {
    const updated = { ...w };
    updated.exercises.splice(exIdx, 1);
    updated.totalVolume = recalcVolume(updated);
    setW(updated);
  };
  
  const updateDuration = (newDuration) => {
    const dur = parseInt(newDuration) || 0;
    const updated = { ...w, duration: dur };
    // Auto-recalc kcal unless user has manually overridden
    if (!kcalEdited) {
      updated.kcal = recalcKcal(dur);
    }
    setW(updated);
  };
  
  const updateKcal = (newKcal) => {
    setKcalEdited(true);
    setW({ ...w, kcal: parseInt(newKcal) || 0 });
  };
  
  return e(Modal, { onClose, title: "Edit workout", subtitle: "Tap any value to change it" },
    // Workout meta
    e('div', { className: "grid grid-cols-2 gap-2 mb-4" },
      e('div', { className: "bg-zinc-800 rounded-xl p-3" },
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase mb-1" }, "Name"),
        e('input', {
          value: w.name,
          onChange: (ev) => setW({ ...w, name: ev.target.value }),
          className: "w-full bg-transparent text-white font-display font-semibold outline-none"
        })
      ),
      e('div', { className: "bg-zinc-800 rounded-xl p-3" },
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase mb-1" }, "Duration (min)"),
        e('input', {
          value: w.duration,
          type: "number",
          onChange: (ev) => updateDuration(ev.target.value),
          className: "w-full bg-transparent text-white font-display font-semibold outline-none"
        })
      )
    ),
    e('div', { className: "bg-orange-500/10 border border-orange-500/20 rounded-xl p-3 mb-2" },
      e('p', { className: "text-[9px] text-orange-400 font-mono-d uppercase mb-1 flex items-center justify-between" }, 
        "Calories burned",
        kcalEdited && e('span', { className: "text-zinc-500" }, "manually set")
      ),
      e('input', {
        value: w.kcal,
        type: "number",
        onChange: (ev) => updateKcal(ev.target.value),
        className: "w-full bg-transparent text-white font-display font-bold text-xl outline-none"
      })
    ),
    e('p', { className: "text-[9px] text-zinc-600 font-mono-d mb-4 text-center" }, 
      kcalEdited ? "↻ Tap reset to use auto-estimate" : `Auto-estimated from duration · ${w.totalVolume ? `vol ${(w.totalVolume/1000).toFixed(1)}t` : ''}`
    ),
    kcalEdited && e('button', { 
      onClick: () => { setKcalEdited(false); setW({ ...w, kcal: recalcKcal(w.duration) }); },
      className: "w-full bg-zinc-800 text-zinc-400 rounded-xl py-2 font-mono-d text-xs uppercase mb-4"
    }, "Reset to auto"),
    
    // Exercises
    e('p', { className: "text-zinc-500 text-[10px] font-mono-d uppercase mb-2" }, "Exercises"),
    e('div', { className: "space-y-3 mb-4 max-h-96 overflow-y-auto scrollbar-hide" },
      w.exercises.map((ex, exIdx) => e('div', { key: exIdx, className: "bg-zinc-800 rounded-xl p-3" },
        e('div', { className: "flex justify-between items-start mb-2" },
          e('p', { className: "text-white font-display font-semibold text-sm flex-1" }, ex.name),
          e('button', { 
            onClick: () => removeExercise(exIdx),
            className: "text-rose-400 p-1"
          }, e(Icon, { d: icons.trash, size: 14 }))
        ),
        e('div', { className: "space-y-1.5" },
          ex.sets.map((s, setIdx) => e('div', { 
            key: setIdx, 
            className: "flex items-center gap-2 bg-zinc-900 rounded-lg p-2"
          },
            e('span', { className: "text-zinc-500 text-xs font-mono-d w-4" }, s.set || setIdx + 1),
            // StairMaster set
            ex.type === "stairmaster" || s.level !== undefined && s.duration !== undefined ?
              e(React.Fragment, null,
                e('div', { className: "flex-1 flex items-center gap-1" },
                  e('span', { className: "text-zinc-500 text-[10px] font-mono-d" }, "LVL"),
                  e('input', {
                    type: "number", step: "0.5",
                    value: s.level || "",
                    onChange: (ev) => updateSet(exIdx, setIdx, 'level', ev.target.value),
                    className: "w-12 bg-zinc-800 text-white font-mono-d text-sm rounded px-2 py-1 outline-none focus:ring-1 focus:ring-orange-400"
                  })
                ),
                e('div', { className: "flex-1 flex items-center gap-1" },
                  e('span', { className: "text-zinc-500 text-[10px] font-mono-d" }, "MIN"),
                  e('input', {
                    type: "number",
                    value: s.duration || "",
                    onChange: (ev) => updateSet(exIdx, setIdx, 'duration', ev.target.value),
                    className: "w-12 bg-zinc-800 text-white font-mono-d text-sm rounded px-2 py-1 outline-none focus:ring-1 focus:ring-orange-400"
                  })
                )
              ) :
            // Treadmill set
            ex.type === "treadmill" && s.incline !== undefined ?
              e(React.Fragment, null,
                e('div', { className: "flex-1 flex items-center gap-1" },
                  e('span', { className: "text-zinc-500 text-[10px] font-mono-d" }, "INC"),
                  e('input', {
                    type: "number", step: "0.5",
                    value: s.incline || "",
                    onChange: (ev) => updateSet(exIdx, setIdx, 'incline', ev.target.value),
                    className: "w-12 bg-zinc-800 text-white font-mono-d text-sm rounded px-2 py-1 outline-none focus:ring-1 focus:ring-orange-400"
                  })
                ),
                e('div', { className: "flex-1 flex items-center gap-1" },
                  e('span', { className: "text-zinc-500 text-[10px] font-mono-d" }, "MIN"),
                  e('input', {
                    type: "number",
                    value: s.duration || "",
                    onChange: (ev) => updateSet(exIdx, setIdx, 'duration', ev.target.value),
                    className: "w-12 bg-zinc-800 text-white font-mono-d text-sm rounded px-2 py-1 outline-none focus:ring-1 focus:ring-orange-400"
                  })
                )
              ) :
            // Strength set
              e(React.Fragment, null,
                e('div', { className: "flex-1 flex items-center gap-1" },
                  e('input', {
                    type: "number", step: "0.5",
                    value: s.weight || "",
                    onChange: (ev) => updateSet(exIdx, setIdx, 'weight', ev.target.value),
                    className: "w-16 bg-zinc-800 text-white font-mono-d text-sm rounded px-2 py-1 outline-none focus:ring-1 focus:ring-emerald-400"
                  }),
                  e('span', { className: "text-zinc-500 text-xs font-mono-d" }, "kg")
                ),
                e('span', { className: "text-zinc-600 text-xs" }, "×"),
                e('div', { className: "flex-1 flex items-center gap-1" },
                  e('input', {
                    type: "number",
                    value: s.reps || "",
                    onChange: (ev) => updateSet(exIdx, setIdx, 'reps', ev.target.value),
                    className: "w-12 bg-zinc-800 text-white font-mono-d text-sm rounded px-2 py-1 outline-none focus:ring-1 focus:ring-emerald-400"
                  }),
                  e('span', { className: "text-zinc-500 text-xs font-mono-d" }, "reps")
                )
              ),
            e('button', { 
              onClick: () => removeSet(exIdx, setIdx),
              className: "text-zinc-500 p-1 active:text-rose-400"
            }, e(Icon, { d: icons.x, size: 12 }))
          ))
        )
      ))
    ),
    
    e('div', { className: "flex gap-3" },
      e('button', { 
        onClick: () => { 
          if (confirm("Delete this entire workout?")) onDelete(); 
        },
        className: "bg-rose-500/20 text-rose-300 rounded-xl py-3 px-4 font-display font-semibold flex items-center gap-2"
      }, e(Icon, { d: icons.trash, size: 16 })),
      e('button', { 
        onClick: onClose,
        className: "flex-1 bg-zinc-800 text-white rounded-xl py-3 font-display font-semibold"
      }, "Cancel"),
      e('button', { 
        onClick: () => {
          const updated = { ...w, totalVolume: recalcVolume(w) };
          onSave(updated);
        },
        className: "flex-1 bg-emerald-400 text-black rounded-xl py-3 font-display font-semibold"
      }, "Save")
    )
  );
};

const ImportResultModal = ({ result, onConfirm, onCancel, bodyWeight }) => 
  e('div', { className: "fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-end" },
    e('div', { className: "w-full bg-zinc-900 rounded-t-3xl p-6 border-t border-white/10 max-h-[85vh] overflow-y-auto scrollbar-hide slide-up pb-safe" },
      e('div', { className: "w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-5" }),
      e('div', { className: "flex items-center gap-2 mb-1" },
        e('div', { className: "w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center" },
          e(Icon, { d: icons.check, size: 16, className: "text-emerald-400" })
        ),
        e('h2', { className: "text-white font-display font-bold text-xl" }, "Workout extracted")
      ),
      e('p', { className: "text-zinc-500 text-xs font-mono-d mb-5 uppercase" }, 
        `${result.exercises.length} exercises · ${result.exercises.reduce((s, ex) => s + ex.sets.length, 0)} sets`
      ),
      
      e('div', { className: "bg-zinc-800 rounded-2xl p-4 mb-3" },
        e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase mb-1" }, "Workout name"),
        e('p', { className: "text-white font-display font-bold text-lg" }, result.name)
      ),
      
      e('div', { className: "grid grid-cols-3 gap-2 mb-3" },
        e('div', { className: "bg-zinc-800 rounded-2xl p-3" },
          e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase mb-1" }, "Duration"),
          e('p', { className: "text-white font-display font-bold" }, 
            result.duration,
            e('span', { className: "text-xs text-zinc-500" }, "min")
          )
        ),
        e('div', { className: "bg-zinc-800 rounded-2xl p-3" },
          e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase mb-1" }, "Volume"),
          e('p', { className: "text-white font-display font-bold" }, 
            (result.totalVolume / 1000).toFixed(1),
            e('span', { className: "text-xs text-zinc-500" }, "t")
          )
        ),
        e('div', { className: "bg-gradient-to-br from-orange-500/20 to-rose-500/10 rounded-2xl p-3 border border-orange-500/20" },
          e('p', { className: "text-[10px] text-orange-400 font-mono-d uppercase mb-1" }, "Est. kcal"),
          e('p', { className: "text-white font-display font-bold" }, result.estimatedKcal)
        )
      ),
      
      e('div', { className: "bg-zinc-800 rounded-2xl p-4 mb-5 max-h-64 overflow-y-auto scrollbar-hide" },
        e('p', { className: "text-[10px] text-zinc-500 font-mono-d uppercase mb-3" }, "Exercises"),
        e('div', { className: "space-y-3" },
          result.exercises.map((ex, i) => e('div', { key: i, className: "border-b border-white/5 last:border-0 pb-2 last:pb-0" },
            e('p', { className: "text-white font-display font-semibold text-sm mb-1" }, 
              ex.name,
              ex.type === "stairmaster" && e('span', { className: "ml-2 text-[9px] bg-orange-500/30 text-orange-300 px-1.5 py-0.5 rounded font-mono-d uppercase" }, "Stair")
            ),
            e('div', { className: "space-y-0.5" },
              ex.sets.map((s, j) => e('p', { key: j, className: "text-zinc-400 text-xs font-mono-d" },
                `${s.set || j+1}. `,
                s.display ? s.display :
                  s.weight !== undefined ? `${s.weight}kg × ${s.reps}` : 
                  s.level !== undefined ? `Level ${s.level} · ${s.duration}min` :
                  s.incline !== undefined ? `Incline ${s.incline} · ${s.duration}min` : ""
              ))
            )
          ))
        )
      ),
      
      e('p', { className: "text-[10px] text-zinc-600 font-mono-d mb-4 leading-relaxed" }, 
        `* Calorie estimate: 5.5 MET × ${bodyWeight}kg × ${(result.duration/60).toFixed(2)}h. You can edit it after adding.`
      ),
      
      e('div', { className: "flex gap-3" },
        e('button', { 
          onClick: onCancel,
          className: "flex-1 bg-zinc-800 text-white rounded-xl py-3 font-display font-semibold"
        }, "Cancel"),
        e('button', { 
          onClick: onConfirm,
          className: "flex-1 bg-emerald-400 text-black rounded-xl py-3 font-display font-semibold flex items-center justify-center gap-2"
        },
          e(Icon, { d: icons.check, size: 18, stroke: "black" }),
          "Add to today"
        )
      )
    )
  );

// ============ WEIGHT CHART ============
const renderWeightChart = (data, weightToGoal, weightLost) => {
  const points = data.weightHistory.map(w => w.weight);
  const minW = Math.min(...points, data.targetWeight) - 0.5;
  const maxW = Math.max(...points) + 0.5;
  const range = maxW - minW;
  
  return e('div', null,
    e('div', { className: "relative h-44 mt-4 mb-2" },
      e('div', { 
        className: "absolute inset-x-0 border-t border-dashed border-emerald-400/40",
        style: { top: `${((maxW - data.targetWeight) / range) * 100}%` }
      },
        e('span', { className: "absolute -top-2 right-0 text-[9px] font-mono-d bg-emerald-400/20 text-emerald-300 px-1.5 py-0.5 rounded" }, 
          `GOAL ${data.targetWeight}kg`
        )
      ),
      e('svg', { className: "w-full h-full", viewBox: "0 0 280 160", preserveAspectRatio: "none" },
        e('defs', null,
          e('linearGradient', { id: "weightGrad", x1: "0%", y1: "0%", x2: "0%", y2: "100%" },
            e('stop', { offset: "0%", stopColor: "rgb(168, 85, 247)", stopOpacity: "0.4" }),
            e('stop', { offset: "100%", stopColor: "rgb(168, 85, 247)", stopOpacity: "0" })
          )
        ),
        e('path', {
          d: `M 0,${((maxW - points[0]) / range) * 160} ${points.map((v, i) => `L ${(i/(points.length-1))*280},${((maxW - v) / range) * 160}`).join(' ')} L 280,160 L 0,160 Z`,
          fill: "url(#weightGrad)"
        }),
        e('path', {
          d: `M 0,${((maxW - points[0]) / range) * 160} ${points.map((v, i) => `L ${(i/(points.length-1))*280},${((maxW - v) / range) * 160}`).join(' ')}`,
          stroke: "rgb(192, 132, 252)", strokeWidth: "2.5", fill: "none", strokeLinecap: "round"
        }),
        points.map((v, i) => e('circle', {
          key: i,
          cx: (i/(points.length-1))*280,
          cy: ((maxW - v) / range) * 160,
          r: i === points.length - 1 ? "4" : "3",
          fill: i === points.length - 1 ? "rgb(192, 132, 252)" : "rgb(168, 85, 247)",
          stroke: "black",
          strokeWidth: "2"
        }))
      )
    ),
    e('div', { className: "grid grid-cols-3 gap-2 mt-5 pt-4 border-t border-white/5" },
      e('div', null,
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Current"),
        e('p', { className: "text-white font-display font-bold" }, `${data.bodyWeight}kg`)
      ),
      e('div', null,
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "Lost"),
        e('p', { className: "text-emerald-400 font-display font-bold" }, `-${weightLost}kg`)
      ),
      e('div', null,
        e('p', { className: "text-[9px] text-zinc-500 font-mono-d uppercase" }, "To goal"),
        e('p', { className: "text-purple-400 font-display font-bold" }, `-${weightToGoal}kg`)
      )
    )
  );
};

// ============ RENDER ============
createRoot(document.getElementById('root')).render(e(App));
</script>
